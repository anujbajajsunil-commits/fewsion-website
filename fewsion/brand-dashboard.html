<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brand Dashboard — Fewsion</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #080808; --deep: #0e0e0e; --card: #141414; --card2: #1a1a1a;
    --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.12);
    --amber: #F5A623; --amber2: #FF6B35; --amber-glow: rgba(245,166,35,0.08);
    --text: #f0ece4; --muted: #888; --muted2: #555; --white: #ffffff;
    --green: #4ade80; --red: #ef4444;
    --font-display: 'Syne', sans-serif; --font-body: 'DM Sans', sans-serif;
    --radius: 16px; --radius-sm: 8px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--black); color: var(--text); font-family: var(--font-body); display: flex; min-height: 100vh; overflow-x: hidden; }
/* Hamburger button — hidden on desktop */
.hamburger-btn {
  display: none;
  width: 40px; height: 40px;
  background: var(--card);
  border: 1px solid var(--border2);
  border-radius: 10px;
  color: var(--white);
  font-size: 18px;
  cursor: pointer;
  flex-shrink: 0;
}

.sidebar-backdrop {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 15;
}
.sidebar-backdrop.open { display: block; }

/* ==========================
   MOBILE SIDEBAR
========================== */

@media (max-width:768px){

    body{
        overflow-x:hidden;
    }

    /* Sidebar */

    aside{
        position:fixed;
        top:0;
        left:0;
        bottom:0;

        width:260px;
        height:100vh;

        background:#0e0e0e;

        transform:translateX(-100%);
        transition:transform .35s ease;

        z-index:9999;

        display:flex;
    }

    aside.open{
        transform:translateX(0);
    }

    /* Overlay */

    .sidebar-backdrop{

        position:fixed;
        inset:0;

        background:rgba(0,0,0,.55);

        display:none;

        z-index:9998;
    }

    .sidebar-backdrop.open{
        display:block;
    }

    /* Main */

    main{

        margin-left:0 !important;

        width:100%;

        padding:20px 16px;

    }

    /* Header */

    .page-header{

        display:flex;

        align-items:center;

        justify-content:space-between;

        gap:12px;

    }

    /* Hamburger */

    .hamburger-btn{

        display:flex;

        align-items:center;

        justify-content:center;

        width:42px;

        height:42px;

        border:none;

        background:#1a1a1a;

        color:#fff;

        border-radius:10px;

        cursor:pointer;

        z-index:10000;

        position:relative;

    }

}

  aside {
    display: flex; /* keep it in DOM, just slide off-screen */
    transform: translateX(-100%);
    transition: transform 0.25s ease;
    width: 240px;
    z-index: 20;
  }
  aside.open { transform: translateX(0); }

  main { margin-left: 0; padding: 20px 16px; }

  .stats-grid { grid-template-columns: 1fr 1fr; gap: 12px; }
  .stat-value { font-size: 22px; }

  header.page-header { flex-wrap: wrap; }
  .header-actions { width: 100%; justify-content: space-between; }

  .form-inline { grid-template-columns: 1fr; }

  .campaign-card { flex-direction: column; align-items: flex-start; }
  .btn-apply { width: 100%; }

  .thread-window { height: 65vh; }
  .msg-bubble { max-width: 85%; }

  .notif-panel { width: 90vw; right: -10px; }

  table.data-table { display: block; overflow-x: auto; white-space: nowrap; }

  .portfolio-grid { grid-template-columns: 1fr; }
}

@media (max-width: 420px) {
  .stats-grid { grid-template-columns: 1fr; }
  h1 { font-size: 22px; }
}
  
  
 
  aside { width: 260px; background: var(--deep); border-right: 1px solid var(--border); padding: 32px 24px; display: flex; flex-direction: column; gap: 40px; position: fixed; top: 0; bottom: 0; left: 0; z-index: 10; }
  .side-logo { font-family: var(--font-display); font-size: 22px; font-weight: 800; color: var(--white); text-decoration: none; }
  .side-logo span { color: var(--amber); }
  .side-menu { list-style: none; display: flex; flex-direction: column; gap: 8px; }
  .side-menu a { display: flex; align-items: center; gap: 14px; padding: 12px 16px; color: var(--muted); text-decoration: none; font-size: 14px; font-weight: 500; border-radius: var(--radius-sm); transition: background 0.2s, color 0.2s; }
  .side-menu a:hover, .side-menu a.active { background: var(--card); color: var(--white); }
  .side-menu a.active { border-left: 3px solid var(--amber); border-radius: 0 var(--radius-sm) var(--radius-sm) 0; }
  .side-menu a .badge-count { margin-left: auto; background: var(--amber); color: #000; font-size: 11px; font-weight: 700; padding: 1px 7px; border-radius: 50px; }
  .side-footer { margin-top: auto; padding-top: 20px; border-top: 1px solid var(--border); }
  .user-badge { display: flex; align-items: center; gap: 12px; }
  .user-avatar { width: 36px; height: 36px; background: linear-gradient(135deg, var(--amber2), var(--amber)); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: var(--font-display); font-weight: 700; color: #000; font-size: 13px; }
  .user-info .name { font-size: 13px; font-weight: 600; color: var(--white); }
  .user-info .role { font-size: 11px; color: var(--muted); }
  .logout-btn { width: 100%; margin-top: 20px; padding: 12px; border: none; border-radius: 10px; background: #1a1a1a; color: #fff; cursor: pointer; font-family: var(--font-body); font-size: 14px; transition: all 0.3s ease; }
  .logout-btn:hover { background: var(--amber); color: #000; }

  main { margin-left: 260px; flex: 1; padding: 40px 5%; max-width: 1400px; }
  header.page-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 40px; gap: 20px; }
  h1 { font-family: var(--font-display); font-size: 28px; font-weight: 800; color: var(--white); letter-spacing: -0.5px; }
  .header-actions { display: flex; align-items: center; gap: 12px; }
  .btn-create { background: var(--amber); color: #000; font-family: var(--font-display); font-size: 14px; font-weight: 700; padding: 10px 20px; border-radius: 50px; text-decoration: none; display: inline-flex; align-items: center; gap: 8px; transition: transform 0.2s; border: none; cursor: pointer; }
  .btn-create:hover { transform: translateY(-1px); }
  .btn-ghost { background: var(--card); border: 1px solid var(--border2); color: var(--text); font-size: 13px; font-weight: 600; padding: 9px 16px; border-radius: 50px; cursor: pointer; }
  .btn-ghost:hover { border-color: var(--white); color: var(--white); }

  .bell-wrap { position: relative; }
  .bell-btn { width: 40px; height: 40px; border-radius: 50%; background: var(--card); border: 1px solid var(--border2); color: var(--text); cursor: pointer; font-size: 16px; position: relative; }
  .bell-btn .dot { position: absolute; top: 6px; right: 7px; width: 8px; height: 8px; background: var(--amber); border-radius: 50%; display: none; }
  .bell-btn.has-unread .dot { display: block; }
  .notif-panel { display: none; position: absolute; right: 0; top: 48px; width: 340px; max-height: 420px; overflow-y: auto; background: var(--card); border: 1px solid var(--border2); border-radius: var(--radius-sm); box-shadow: 0 12px 40px rgba(0,0,0,0.5); z-index: 30; padding: 12px; }
  .notif-panel.open { display: block; }

  .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 40px; }
  .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; }
  .stat-label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
  .stat-value { font-family: var(--font-display); font-size: 32px; font-weight: 800; color: var(--white); }
  .stat-change { font-size: 12px; margin-top: 4px; display: flex; align-items: center; gap: 4px; }
  .stat-change.up { color: var(--green); }

  .dashboard-row { display: grid; grid-template-columns: 2fr 1fr; gap: 32px; }
  .section-box { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px; margin-bottom: 32px; }
  .section-box h2 { font-family: var(--font-display); font-size: 18px; font-weight: 700; color: var(--white); margin-bottom: 20px; }

  .campaign-item { display: flex; align-items: center; justify-content: space-between; padding: 16px; background: var(--deep); border: 1px solid var(--border); border-radius: var(--radius-sm); margin-bottom: 12px; cursor: pointer; transition: border-color 0.2s; }
  .campaign-item:hover { border-color: var(--border2); }
  .campaign-info h3 { font-size: 15px; font-weight: 600; color: var(--white); margin-bottom: 4px; }
  .campaign-meta { font-size: 12px; color: var(--muted); display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
  .status-tag { background: rgba(245, 166, 35, 0.1); border: 1px solid rgba(245, 166, 35, 0.2); color: var(--amber); font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 50px; text-transform: capitalize; }
  .status-tag.active-live { background: rgba(74,222,128,0.1); border: 1px solid rgba(74,222,128,0.2); color: var(--green); }
  .status-tag.rejected { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2); color: var(--red); }

  .empty-state-box { padding: 32px; text-align: center; color: var(--muted); border: 1px dashed var(--border2); border-radius: var(--radius-sm); font-size: 14px; }

  .feed-item { display: flex; gap: 12px; font-size: 13.5px; line-height: 1.5; padding-bottom: 16px; border-bottom: 1px solid var(--border); margin-bottom: 16px; }
  .feed-item:last-child { border: none; margin-bottom: 0; padding-bottom: 0; }
  .feed-icon { width: 24px; height: 24px; background: var(--amber-glow); border: 1px solid rgba(245,166,35,0.2); color: var(--amber); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; flex-shrink: 0; }
  .feed-text span { color: var(--white); font-weight: 500; }
  .feed-time { font-size: 11px; color: var(--muted2); margin-top: 2px; }

  .action-btn-approve, .action-btn-reject { font-size: 12px; font-weight: 600; padding: 6px 14px; border-radius: 50px; cursor: pointer; border: 1px solid; }
  .action-btn-approve { background: rgba(74,222,128,0.1); border-color: rgba(74,222,128,0.3); color: var(--green); }
  .action-btn-reject { background: rgba(239,68,68,0.1); border-color: rgba(239,68,68,0.3); color: var(--red); }
  .action-btn-approve:disabled, .action-btn-reject:disabled { opacity: 0.4; cursor: not-allowed; }

  table.data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  table.data-table th { text-align: left; color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; padding: 10px 12px; border-bottom: 1px solid var(--border2); }
  table.data-table td { padding: 12px; border-bottom: 1px solid var(--border); color: var(--text); }
  table.data-table tr:last-child td { border-bottom: none; }

  .back-link { display: inline-flex; align-items: center; gap: 6px; color: var(--muted); font-size: 13px; text-decoration: none; cursor: pointer; margin-bottom: 20px; background: none; border: none; }
  .back-link:hover { color: var(--white); }

  .thread-list { display: flex; flex-direction: column; gap: 8px; }
  .thread-row { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; background: var(--deep); border: 1px solid var(--border); border-radius: var(--radius-sm); cursor: pointer; }
  .thread-row:hover { border-color: var(--border2); }
  .thread-window { display: flex; flex-direction: column; height: 480px; background: var(--deep); border: 1px solid var(--border); border-radius: var(--radius-sm); overflow: hidden; }
  .thread-messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
  .msg-bubble { max-width: 70%; padding: 10px 14px; border-radius: 14px; font-size: 13.5px; line-height: 1.5; }
  .msg-bubble.mine { align-self: flex-end; background: var(--amber); color: #000; }
  .msg-bubble.theirs { align-self: flex-start; background: var(--card2); color: var(--text); }
  .msg-time { font-size: 10px; opacity: 0.6; margin-top: 4px; }
  .thread-input-row { display: flex; gap: 8px; padding: 14px; border-top: 1px solid var(--border); }
  .thread-input-row input { flex: 1; background: var(--card2); border: 1px solid var(--border2); border-radius: 50px; padding: 10px 16px; color: var(--white); font-size: 13px; outline: none; }
  .thread-input-row button { background: var(--amber); border: none; color: #000; font-weight: 700; padding: 10px 20px; border-radius: 50px; cursor: pointer; font-size: 13px; }

  .loading-state { text-align: center; padding: 80px 0; color: var(--muted); }

  .view { display: none; }
  .view.active { display: block; }

  /* @media (max-width: 1024px) {
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
    .dashboard-row { grid-template-columns: 1fr; }
  }
  @media (max-width: 768px) {
    aside { display: none; }
    main { margin-left: 0; padding-top: 20px; }
    .stats-grid { grid-template-columns: 1fr; }
  } */
</style>
</head>
<body>

<aside>
  <a class="side-logo" href="index.html">Few<span>sion</span></a>
  <ul class="side-menu" id="sideMenu">
    <li><a href="#overview" data-route="overview">📊 Overview</a></li>
    <li><a href="#campaigns" data-route="campaigns">📣 Campaigns</a></li>
    <li><a href="#applications" data-route="applications">🧑‍🤝‍🧑 Applications <span class="badge-count" id="navAppCount" style="display:none">0</span></a></li>
    <li><a href="#payments" data-route="payments">💳 Payments</a></li>
    <li><a href="#messages" data-route="messages">💬 Messages</a></li>
  </ul>
  <div class="side-footer">
    <div class="user-badge">
      <div class="user-avatar" id="sidebarAvatar">--</div>
      <div class="user-info">
        <div class="name" id="sidebarBrandName">Loading...</div>
        <div class="role">Brand Partner</div>
      </div>
    </div>
    <button id="logoutBtn" class="logout-btn">🚪 Logout</button>
  </div>
</aside>

<main id="mainWorkspace">
  <header class="page-header">
   <div style="display:flex;align-items:center;gap:14px">
      <button class="hamburger-btn" id="hamburgerBtn" aria-label="Open menu">☰</button>
      <div>
        <h1 id="pageTitle">Brand Data</h1>
        <p style="color: var(--muted); font-size: 14px; margin-top: 4px;" id="pageSubtitle">Post a Campaign & Get Creators</p>
      </div>
    </div>
    <div class="header-actions">
      <div class="bell-wrap">
        <button class="bell-btn" id="bellBtn"><span class="dot" id="bellDot"></span>🔔</button>
        <div class="notif-panel" id="notifPanel"></div>
      </div>
      <button class="btn-create" onclick="window.location.href='fewsion_brand_portal.html?new=true'">✨ New AI Campaign</button>
    </div>
  </header>

  <div id="viewRoot">
    <div class="loading-state">Loading your workspace...</div>
  </div>
</main>
<div class="sidebar-backdrop" id="sidebarBackdrop"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="fewsion-auth.js"></script>
<script src="brands-dash.js"></script>
<script>
// ---------------------------------------------------------------------
// Bootstrapping
// ---------------------------------------------------------------------
document.addEventListener("DOMContentLoaded", async () => {
  try {
    const user = await FewsionData.init();
    if (!user) return; // FewsionData.init() already redirected via FewsionAuth

    if (!FewsionData.state.profile) {
      window.location.href = "fewsion_brand_portal.html";
      return;
    }

    hydrateSidebar();
    FewsionData.onChange(onDataChange);
    window.addEventListener("hashchange", route);
    route();
  } catch (err) {
    console.error("Dashboard init failed:", err);
    document.getElementById("viewRoot").innerHTML = `<div class="empty-state-box">Something went wrong loading your dashboard. Please refresh.</div>`;
  }
});

function hydrateSidebar() {
  const company = FewsionData.state.profile.brand_name || "Brand Partner";
  document.getElementById("sidebarBrandName").textContent = company;
  const initials = company.split(" ").map((w) => w[0]).join("").toUpperCase().slice(0, 2);
  document.getElementById("sidebarAvatar").textContent = initials || "B";
}

// Re-render whichever section changed, plus always refresh badges/notifications
function onDataChange(section) {
  updateNavBadges();
  renderNotifPanel();
  const current = currentRoute();
  // Re-render the active view if the change is relevant to it
  if (section === "all" || section === current.name || (current.name === "campaign-detail" && ["applications", "collaborations", "payments"].includes(section))) {
    renderRoute(current);
  }
  if (section.startsWith("messages:") && current.name === "messages" && current.params.collabId === section.split(":")[1]) {
    renderRoute(current);
  }
}

function updateNavBadges() {
  const pendingCount = FewsionData.state.applications.filter((a) => (a.status || "pending").toLowerCase() === "pending").length;
  const el = document.getElementById("navAppCount");
  if (pendingCount > 0) { el.style.display = "inline-block"; el.textContent = pendingCount; }
  else { el.style.display = "none"; }

  const unread = FewsionData.unreadNotificationCount();
  document.getElementById("bellBtn").classList.toggle("has-unread", unread > 0);
}

// ---------------------------------------------------------------------
// Router
// ---------------------------------------------------------------------
function currentRoute() {
  const hash = (window.location.hash || "#overview").slice(1);
  const [name, param] = hash.split("/");
  if (name === "campaign") return { name: "campaign-detail", params: { id: param } };
  if (name === "messages" && param) return { name: "messages", params: { collabId: param } };
  return { name: name || "overview", params: {} };
}

function route() {
  const r = currentRoute();
  document.querySelectorAll(".side-menu a").forEach((a) => {
    a.classList.toggle("active", a.dataset.route === (r.name === "campaign-detail" ? "campaigns" : r.name));
  });
  renderRoute(r);
}

function renderRoute(r) {
  const titles = {
    overview: ["Overview", "Monitor your active UGC content and applications."],
    campaigns: ["Campaigns", "All your brief campaigns, live and past."],
    "campaign-detail": ["Campaign detail", ""],
    applications: ["Applications", "Review and respond to creator applications."],
    payments: ["Payments", "Track spend across all active collaborations."],
    messages: ["Messages", "Conversations with your active creators."],
  };
  const [title, subtitle] = titles[r.name] || titles.overview;
  document.getElementById("pageTitle").textContent = title;
  document.getElementById("pageSubtitle").textContent = subtitle;

  const root = document.getElementById("viewRoot");
  switch (r.name) {
    case "campaigns": return renderCampaigns(root);
    case "campaign-detail": return renderCampaignDetail(root, r.params.id);
    case "applications": return renderApplicationsView(root);
    case "payments": return renderPaymentsView(root);
    case "messages": return renderMessagesView(root, r.params.collabId);
    default: return renderOverview(root);
  }
}

// ---------------------------------------------------------------------
// View: Overview
// ---------------------------------------------------------------------
function renderOverview(root) {
  const { campaigns, applications, collaborations, notifications } = FewsionData.state;
  const spend = FewsionData.totalSpend();

  root.innerHTML = `
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Active campaigns</div>
        <div class="stat-value">${campaigns.length}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Applications received</div>
        <div class="stat-value" style="font-size:24px;padding-top:6px">${applications.length}</div>
        <div class="stat-change up">▲ Live targeting</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Active collaborations</div>
        <div class="stat-value" style="font-size:24px;padding-top:6px">${collaborations.length}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Total spend</div>
        <div class="stat-value" style="font-size:20px;color:var(--amber);padding-top:8px">₹${spend.toLocaleString()}</div>
      </div>
    </div>

    <div class="dashboard-row">
      <div class="section-box">
        <h2>Active brief campaigns</h2>
        <div id="ovCampaigns"></div>
      </div>
      <div class="section-box">
        <h2>Recent system actions</h2>
        <div id="ovFeed"></div>
      </div>
    </div>
  `;

  const cList = document.getElementById("ovCampaigns");
  if (!campaigns.length) {
    cList.innerHTML = `<div class="empty-state-box">No live brief campaigns active. Click "New AI Campaign" above to publish your first one.</div>`;
  } else {
    cList.innerHTML = "";
    campaigns.slice(0, 6).forEach((c) => cList.appendChild(campaignRowEl(c)));
  }

  const feed = document.getElementById("ovFeed");
  if (!notifications.length) {
    feed.innerHTML = `
      <div class="feed-item">
        <div class="feed-icon">🔒</div>
        <div class="feed-text"><span>Supabase infrastructure connected</span> securely with dynamic parameters.<div class="feed-time">Active session</div></div>
      </div>`;
  } else {
    feed.innerHTML = notifications.slice(0, 6).map(notifItemHtml).join("");
  }
}

function campaignRowEl(item) {
  const title = item.campaign_title || "Untitled brief campaign";
  const platform = item.target_platform || "Multi-platform";
  const budgetValue = item.budget_allocated ? `₹${parseInt(item.budget_allocated).toLocaleString()}` : "Negotiable";
  const status = item.status_state || "Live";

  const row = document.createElement("div");
  row.className = "campaign-item";
  row.innerHTML = `
    <div class="campaign-info">
      <h3>${escapeHtml(title)}</h3>
      <div class="campaign-meta">
        <span>Platform: ${escapeHtml(platform)}</span>
        <span>Budget: ${budgetValue}</span>
        <span class="status-tag ${status.toLowerCase() === "live" ? "active-live" : ""}">${escapeHtml(status)}</span>
      </div>
    </div>
    <div style="font-size:13px;color:var(--muted);font-weight:500">View dashboard →</div>
  `;
  row.addEventListener("click", () => { window.location.hash = `#campaign/${item.id}`; });
  return row;
}

function notifItemHtml(n) {
  return `
    <div class="feed-item">
      <div class="feed-icon">${n.is_read ? "✓" : "🔔"}</div>
      <div class="feed-text">
        <span>${escapeHtml(n.title || "Notification")}</span>${n.message ? " — " + escapeHtml(n.message) : ""}
        <div class="feed-time">${n.created_at ? new Date(n.created_at).toLocaleString() : ""}</div>
      </div>
    </div>`;
}

// ---------------------------------------------------------------------
// View: Campaigns list
// ---------------------------------------------------------------------
function renderCampaigns(root) {
  const { campaigns } = FewsionData.state;
  root.innerHTML = `<div class="section-box"><h2>All campaigns</h2><div id="allCampaigns"></div></div>`;
  const list = document.getElementById("allCampaigns");
  if (!campaigns.length) {
    list.innerHTML = `<div class="empty-state-box">No campaigns yet. Click "New AI Campaign" to create one.</div>`;
    return;
  }
  list.innerHTML = "";
  campaigns.forEach((c) => list.appendChild(campaignRowEl(c)));
}

// ---------------------------------------------------------------------
// View: Campaign detail
// ---------------------------------------------------------------------
function renderCampaignDetail(root, id) {
  const campaign = FewsionData.campaignById(id);
  if (!campaign) {
    root.innerHTML = `<div class="empty-state-box">Campaign not found.</div>`;
    return;
  }
  document.getElementById("pageTitle").textContent = campaign.campaign_title || "Campaign";

  const apps = FewsionData.applicationsForCampaign(id);
  const collabs = FewsionData.collaborationsForCampaign(id);
  const spend = collabs.reduce((sum, c) => sum + FewsionData.paymentsForCollaboration(c.id).reduce((s, p) => s + Number(p.amount || 0), 0), 0);

  root.innerHTML = `
    <button class="back-link" onclick="window.location.hash='#campaigns'">← Back to campaigns</button>
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-label">Status</div><div class="stat-value" style="font-size:20px">${escapeHtml(campaign.status_state || "Live")}</div></div>
      <div class="stat-card"><div class="stat-label">Platform</div><div class="stat-value" style="font-size:18px">${escapeHtml(campaign.target_platform || "Multi-platform")}</div></div>
      <div class="stat-card"><div class="stat-label">Budget</div><div class="stat-value" style="font-size:20px;color:var(--amber)">₹${campaign.budget_allocated ? parseInt(campaign.budget_allocated).toLocaleString() : "—"}</div></div>
      <div class="stat-card"><div class="stat-label">Spend so far</div><div class="stat-value" style="font-size:20px">₹${spend.toLocaleString()}</div></div>
    </div>
    <div class="dashboard-row">
      <div class="section-box">
        <h2>Applications (${apps.length})</h2>
        <div id="detailApplications"></div>
      </div>
      <div class="section-box">
        <h2>Active collaborations (${collabs.length})</h2>
        <div id="detailCollabs"></div>
      </div>
    </div>
  `;

  const appsEl = document.getElementById("detailApplications");
  if (!apps.length) appsEl.innerHTML = `<div class="empty-state-box">No applications yet.</div>`;
  else { appsEl.innerHTML = ""; apps.forEach((a) => appsEl.appendChild(applicationRowEl(a))); }

  const collabsEl = document.getElementById("detailCollabs");
  if (!collabs.length) {
    collabsEl.innerHTML = `<div class="empty-state-box">No active collaborations yet.</div>`;
  } else {
    collabsEl.innerHTML = collabs.map((c) => `
      <div class="campaign-item" style="cursor:default">
        <div class="campaign-info">
          <h3>Collaboration</h3>
          <div class="campaign-meta">
            <span>Status: ${escapeHtml(c.status || "active")}</span>
            <span>Payment: ${c.payment ? "₹" + Number(c.payment).toLocaleString() : "—"}</span>
          </div>
        </div>
        <button class="btn-ghost" onclick="window.location.hash='#messages/${c.id}'">Message</button>
      </div>
    `).join("");
  }
}

// ---------------------------------------------------------------------
// View: Applications
// ---------------------------------------------------------------------
function renderApplicationsView(root) {
  const { applications, campaigns } = FewsionData.state;
  root.innerHTML = `<div class="section-box"><h2>All applications</h2><div id="allApplications"></div></div>`;
  const list = document.getElementById("allApplications");
  if (!applications.length) {
    list.innerHTML = `<div class="empty-state-box">No applications yet.</div>`;
    return;
  }
  list.innerHTML = "";
  applications.forEach((a) => list.appendChild(applicationRowEl(a, campaigns)));
}

function applicationRowEl(app, campaignsOverride) {
  const campaigns = campaignsOverride || FewsionData.state.campaigns;
  const applicant = app.users || {};
  const applicantName = [applicant.first_name, applicant.last_name].filter(Boolean).join(" ") || applicant.email || "Unknown applicant";
  const campaign = campaigns.find((c) => c.id === app.campaign_id);
  const campaignTitle = campaign ? campaign.campaign_title : "Untitled campaign";
  const status = (app.status || "pending").toLowerCase();

  const row = document.createElement("div");
  row.className = "campaign-item";
  row.style.cursor = "default";
  row.innerHTML = `
    <div class="campaign-info">
      <h3>${escapeHtml(applicantName)} ${applicant.role ? `<span style="color:var(--muted);font-weight:400;font-size:12px">(${escapeHtml(applicant.role)})</span>` : ""}</h3>
      <div class="campaign-meta">
        <span>Campaign: ${escapeHtml(campaignTitle)}</span>
        <span>Applied: ${app.applied_at ? new Date(app.applied_at).toLocaleDateString() : "—"}</span>
        <span class="status-tag ${status === "approved" ? "active-live" : status === "rejected" ? "rejected" : ""}">${status}</span>
      </div>
    </div>
    <div style="display:flex;gap:8px;flex-shrink:0">
      <button class="action-btn-approve" ${status === "approved" ? "disabled" : ""}>Approve</button>
      <button class="action-btn-reject" ${status === "rejected" ? "disabled" : ""}>Reject</button>
    </div>
  `;
  row.querySelector(".action-btn-approve").addEventListener("click", () => handleAppAction(app.id, "approved", row));
  row.querySelector(".action-btn-reject").addEventListener("click", () => handleAppAction(app.id, "rejected", row));
  return row;
}

async function handleAppAction(applicationId, status, row) {
  const btns = row.querySelectorAll("button");
  btns.forEach((b) => (b.disabled = true));
  try {
    await FewsionData.updateApplicationStatus(applicationId, status);
    // onDataChange will trigger a re-render of the active view
  } catch (err) {
    console.error(err);
    alert("Couldn't update this application. Please try again.");
    btns.forEach((b) => (b.disabled = false));
  }
}

// ---------------------------------------------------------------------
// View: Payments
// ---------------------------------------------------------------------
function renderPaymentsView(root) {
  const { payments, collaborations } = FewsionData.state;
  const total = FewsionData.totalSpend();
  const released = FewsionData.totalSpend(true);

  root.innerHTML = `
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-label">Total logged</div><div class="stat-value" style="font-size:22px;color:var(--amber)">₹${total.toLocaleString()}</div></div>
      <div class="stat-card"><div class="stat-label">Released</div><div class="stat-value" style="font-size:22px;color:var(--green)">₹${released.toLocaleString()}</div></div>
      <div class="stat-card"><div class="stat-label">Pending</div><div class="stat-value" style="font-size:22px">₹${(total - released).toLocaleString()}</div></div>
    </div>
    <div class="section-box">
      <h2>Payment history</h2>
      <div id="paymentsTableWrap"></div>
    </div>
  `;

  const wrap = document.getElementById("paymentsTableWrap");
  if (!payments.length) {
    wrap.innerHTML = `<div class="empty-state-box">No payments logged yet.</div>`;
    return;
  }
  wrap.innerHTML = `
    <table class="data-table">
      <thead><tr><th>Amount</th><th>Status</th><th>Collaboration</th><th>Released</th></tr></thead>
      <tbody>
        ${payments.map((p) => {
          const collab = collaborations.find((c) => c.id === p.collaboration_id);
          return `
            <tr>
              <td>₹${Number(p.amount || 0).toLocaleString()}</td>
              <td><span class="status-tag ${p.status === "released" ? "active-live" : ""}">${escapeHtml(p.status || "pending")}</span></td>
              <td>${collab ? collab.id.slice(0, 8) + "…" : "—"}</td>
              <td>${p.released_at ? new Date(p.released_at).toLocaleDateString() : "—"}</td>
            </tr>`;
        }).join("")}
      </tbody>
    </table>
  `;
}

// ---------------------------------------------------------------------
// View: Messages
// ---------------------------------------------------------------------
function renderMessagesView(root, collabId) {
  const { collaborations } = FewsionData.state;

  if (!collabId) {
    root.innerHTML = `<div class="section-box"><h2>Conversations</h2><div class="thread-list" id="threadList"></div></div>`;
    const list = document.getElementById("threadList");
    if (!collaborations.length) {
      list.innerHTML = `<div class="empty-state-box">Messages open up once you approve a creator into an active collaboration.</div>`;
      return;
    }
    list.innerHTML = "";
    collaborations.forEach((c) => {
      const row = document.createElement("div");
      row.className = "thread-row";
      row.innerHTML = `
        <div>
          <div style="font-size:14px;font-weight:600;color:var(--white)">Collaboration ${c.id.slice(0, 8)}…</div>
          <div style="font-size:12px;color:var(--muted)">Status: ${escapeHtml(c.status || "active")}</div>
        </div>
        <span style="color:var(--muted);font-size:13px">Open →</span>
      `;
      row.addEventListener("click", () => { window.location.hash = `#messages/${c.id}`; });
      list.appendChild(row);
    });
    return;
  }

  // Specific thread
  root.innerHTML = `
    <button class="back-link" onclick="window.location.hash='#messages'">← All conversations</button>
    <div class="thread-window">
      <div class="thread-messages" id="threadMessages"><div class="empty-state-box">Loading conversation...</div></div>
      <div class="thread-input-row">
        <input type="text" id="threadInput" placeholder="Type a message..." />
        <button id="threadSendBtn">Send</button>
      </div>
    </div>
  `;

  const currentUser = FewsionData.getUser();

  async function refreshThread() {
    const msgs = FewsionData.state.messages[collabId] || (await FewsionData.loadMessages(collabId));
    const el = document.getElementById("threadMessages");
    if (!el) return; // user navigated away
    if (!msgs.length) {
      el.innerHTML = `<div class="empty-state-box">No messages yet. Say hello!</div>`;
    } else {
      el.innerHTML = msgs.map((m) => `
        <div class="msg-bubble ${m.sender_id === currentUser.id ? "mine" : "theirs"}">
          ${escapeHtml(m.content)}
          <div class="msg-time">${new Date(m.created_at).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" })}</div>
        </div>
      `).join("");
    }
    el.scrollTop = el.scrollHeight;
  }
  refreshThread();

  const sendBtn = document.getElementById("threadSendBtn");
  const input = document.getElementById("threadInput");
  async function send() {
    const val = input.value;
    if (!val.trim()) return;
    input.value = "";
    try {
      await FewsionData.sendMessage(collabId, val);
      refreshThread();
    } catch (err) {
      console.error(err);
      alert("Message failed to send.");
    }
  }
  sendBtn.addEventListener("click", send);
  input.addEventListener("keydown", (e) => { if (e.key === "Enter") send(); });
}

// ---------------------------------------------------------------------
// Notifications panel
// ---------------------------------------------------------------------
function renderNotifPanel() {
  const panel = document.getElementById("notifPanel");
  const notifications = FewsionData.state.notifications;
  if (!notifications.length) {
    panel.innerHTML = `<div class="empty-state-box" style="border:none;padding:20px">No notifications yet.</div>`;
    return;
  }
  panel.innerHTML = notifications.slice(0, 15).map(notifItemHtml).join("");
}

document.getElementById("bellBtn").addEventListener("click", async (e) => {
  e.stopPropagation();
  const panel = document.getElementById("notifPanel");
  panel.classList.toggle("open");
  if (panel.classList.contains("open")) {
    await FewsionData.markNotificationsRead();
  }
});
document.addEventListener("click", (e) => {
  const panel = document.getElementById("notifPanel");
  if (!panel.contains(e.target) && e.target.id !== "bellBtn") panel.classList.remove("open");
});

// ---------------------------------------------------------------------
// Logout
// ---------------------------------------------------------------------
document.getElementById("logoutBtn").addEventListener("click", async (e) => {
  e.preventDefault();
  if (!confirm("Are you sure you want to log out of your brand panel?")) return;
  try {
    document.body.style.opacity = "0.3";
    document.body.style.transition = "opacity 0.2s ease";
    localStorage.clear();
    sessionStorage.clear();
    await FewsionAuth.signOut("login.html");
  } catch (err) {
    document.body.style.opacity = "1";
    console.error("Logout execution fault:", err);
    alert("Error logging out. Please try again.");
  }
});

// ---------------------------------------------------------------------
// Utils
// ---------------------------------------------------------------------
function escapeHtml(str) {
  if (str === null || str === undefined) return "";
  return String(str).replace(/[&<>"']/g, (m) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[m]));
}
   //Toggle 
  const asideEl = document.querySelector("aside");
const backdrop = document.getElementById("sidebarBackdrop");
const hamburgerBtn = document.getElementById("hamburgerBtn");

function openSidebar() {
  asideEl.classList.add("open");
  backdrop.classList.add("open");
}
function closeSidebar() {
  asideEl.classList.remove("open");
  backdrop.classList.remove("open");
}

hamburgerBtn.addEventListener("click", openSidebar);
backdrop.addEventListener("click", closeSidebar);

// Close sidebar automatically when a nav link is tapped (mobile)
document.querySelectorAll(".side-menu a").forEach((a) => {
  a.addEventListener("click", () => { if (window.innerWidth <= 768) closeSidebar(); });
});
</script>
