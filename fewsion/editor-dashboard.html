<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Editor Dashboard — Fewsion</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #080808; --deep: #0e0e0e; --card: #141414; --card2: #1a1a1a;
    --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.12);
    --amber: #F5A623; --amber2: #FF6B35; --amber-glow: rgba(245,166,35,0.08);
    --text: #f0ece4; --muted: #888; --muted2: #555; --white: #ffffff;
    --green: #4ade80; --red: #ef4444;
    --font-display: 'Syne', sans-serif; --font-body: 'DM Sans', sans-serif;
    --radius: 16px; --radius-sm: 8px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--black); color: var(--text); font-family: var(--font-body); display: flex; min-height: 100vh; overflow-x: hidden; }

  aside { width: 260px; background: var(--deep); border-right: 1px solid var(--border); padding: 32px 24px; display: flex; flex-direction: column; gap: 40px; position: fixed; top: 0; bottom: 0; left: 0; z-index: 10; }
  .side-logo { font-family: var(--font-display); font-size: 22px; font-weight: 800; color: var(--white); text-decoration: none; }
  .side-logo span { color: var(--amber); }
  .side-menu { list-style: none; display: flex; flex-direction: column; gap: 8px; }
  .side-menu a { display: flex; align-items: center; gap: 14px; padding: 12px 16px; color: var(--muted); text-decoration: none; font-size: 14px; font-weight: 500; border-radius: var(--radius-sm); transition: background 0.2s, color 0.2s; }
  .side-menu a:hover, .side-menu a.active { background: var(--card); color: var(--white); }
  .side-menu a.active { border-left: 3px solid var(--amber); border-radius: 0 var(--radius-sm) var(--radius-sm) 0; }
  .side-footer { margin-top: auto; padding-top: 20px; border-top: 1px solid var(--border); }
  .user-badge { display: flex; align-items: center; gap: 12px; }
  .user-avatar { width: 36px; height: 36px; background: linear-gradient(135deg, var(--amber), var(--amber2)); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: var(--font-display); font-weight: 800; color: #000; font-size: 13px; flex-shrink: 0; }
  .user-info .name { font-size: 13px; font-weight: 600; color: var(--white); }
  .user-info .role { font-size: 11px; color: var(--amber); font-weight: 500; }
  .logout-btn { width: 100%; background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.2); color: var(--red); font-family: var(--font-display); font-size: 13px; font-weight: 600; padding: 10px; border-radius: var(--radius-sm); cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 16px; }
  .logout-btn:hover { background: rgba(239, 68, 68, 0.2); }

  main { margin-left: 260px; flex: 1; padding: 40px 5%; max-width: 1400px; }
  header.page-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 40px; gap: 20px; }
  h1 { font-family: var(--font-display); font-size: 28px; font-weight: 800; color: var(--white); letter-spacing: -0.5px; }
  .header-actions { display: flex; align-items: center; gap: 12px; }
  .btn-upload { background: var(--amber); color: #000; font-family: var(--font-display); font-size: 14px; font-weight: 700; padding: 10px 20px; border-radius: 50px; text-decoration: none; display: inline-flex; align-items: center; gap: 8px; transition: transform 0.2s; border: none; cursor: pointer; }
  .btn-upload:hover { transform: translateY(-1px); }
  .btn-ghost { background: var(--card); border: 1px solid var(--border2); color: var(--text); font-size: 13px; font-weight: 600; padding: 9px 16px; border-radius: 50px; cursor: pointer; }
  .btn-ghost:hover { border-color: var(--white); color: var(--white); }

  .bell-wrap { position: relative; }
  .bell-btn { width: 40px; height: 40px; border-radius: 50%; background: var(--card); border: 1px solid var(--border2); color: var(--text); cursor: pointer; font-size: 16px; position: relative; }
  .bell-btn .dot { position: absolute; top: 6px; right: 7px; width: 8px; height: 8px; background: var(--amber); border-radius: 50%; display: none; }
  .bell-btn.has-unread .dot { display: block; }
  .notif-panel { display: none; position: absolute; right: 0; top: 48px; width: 340px; max-height: 420px; overflow-y: auto; background: var(--card); border: 1px solid var(--border2); border-radius: var(--radius-sm); box-shadow: 0 12px 40px rgba(0,0,0,0.5); z-index: 30; padding: 12px; }
  .notif-panel.open { display: block; }

  .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 40px; }
  .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; }
  .stat-label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
  .stat-value { font-family: var(--font-display); font-size: 32px; font-weight: 800; color: var(--white); }
  .stat-change { font-size: 12px; margin-top: 4px; display: flex; align-items: center; gap: 4px; }
  .stat-change.up { color: var(--green); }

  .dashboard-row { display: grid; grid-template-columns: 2fr 1fr; gap: 32px; }
  .section-box { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px; margin-bottom: 32px; }
  .section-box h2 { font-family: var(--font-display); font-size: 18px; font-weight: 700; color: var(--white); margin-bottom: 20px; }

  .pipeline-item { display: flex; align-items: center; justify-content: space-between; padding: 16px; background: var(--deep); border: 1px solid var(--border); border-radius: var(--radius-sm); margin-bottom: 12px; }
  .pipeline-info h3 { font-size: 15px; font-weight: 600; color: var(--white); margin-bottom: 4px; }
  .pipeline-meta { font-size: 12px; color: var(--muted); display: flex; gap: 14px; align-items: center; flex-wrap: wrap; }
  .status-tag { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 50px; text-transform: capitalize; background: rgba(245,166,35,0.1); border: 1px solid rgba(245,166,35,0.2); color: var(--amber); }
  .status-tag.completed, .status-tag.delivered { background: rgba(74,222,128,0.1); border: 1px solid rgba(74,222,128,0.2); color: var(--green); }
  .status-tag.revision { background: rgba(255,107,53,0.1); border: 1px solid rgba(255,107,53,0.2); color: var(--amber2); }

  .empty-state-box { padding: 32px; text-align: center; color: var(--muted); border: 1px dashed var(--border2); border-radius: var(--radius-sm); font-size: 14px; }

  .feed-item { display: flex; gap: 12px; font-size: 13.5px; line-height: 1.5; padding-bottom: 16px; border-bottom: 1px solid var(--border); margin-bottom: 16px; }
  .feed-item:last-child { border: none; margin-bottom: 0; padding-bottom: 0; }
  .feed-icon { width: 24px; height: 24px; background: var(--amber-glow); border: 1px solid rgba(245,166,35,0.2); color: var(--amber); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; flex-shrink: 0; }
  .feed-text span { color: var(--white); font-weight: 500; }
  .feed-time { font-size: 11px; color: var(--muted2); margin-top: 2px; }

  table.data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  table.data-table th { text-align: left; color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; padding: 10px 12px; border-bottom: 1px solid var(--border2); }
  table.data-table td { padding: 12px; border-bottom: 1px solid var(--border); color: var(--text); }
  table.data-table tr:last-child td { border-bottom: none; }

  .back-link { display: inline-flex; align-items: center; gap: 6px; color: var(--muted); font-size: 13px; text-decoration: none; cursor: pointer; margin-bottom: 20px; background: none; border: none; }
  .back-link:hover { color: var(--white); }

  .thread-list { display: flex; flex-direction: column; gap: 8px; }
  .thread-row { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; background: var(--deep); border: 1px solid var(--border); border-radius: var(--radius-sm); cursor: pointer; }
  .thread-row:hover { border-color: var(--border2); }
  .thread-window { display: flex; flex-direction: column; height: 480px; background: var(--deep); border: 1px solid var(--border); border-radius: var(--radius-sm); overflow: hidden; }
  .thread-messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
  .msg-bubble { max-width: 70%; padding: 10px 14px; border-radius: 14px; font-size: 13.5px; line-height: 1.5; }
  .msg-bubble.mine { align-self: flex-end; background: var(--amber); color: #000; }
  .msg-bubble.theirs { align-self: flex-start; background: var(--card2); color: var(--text); }
  .msg-time { font-size: 10px; opacity: 0.6; margin-top: 4px; }
  .thread-input-row { display: flex; gap: 8px; padding: 14px; border-top: 1px solid var(--border); }
  .thread-input-row input { flex: 1; background: var(--card2); border: 1px solid var(--border2); border-radius: 50px; padding: 10px 16px; color: var(--white); font-size: 13px; outline: none; }
  .thread-input-row button { background: var(--amber); border: none; color: #000; font-weight: 700; padding: 10px 20px; border-radius: 50px; cursor: pointer; font-size: 13px; }

  .profile-summary-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--border); font-size: 13.5px; }
  .profile-summary-row:last-child { border-bottom: none; }
  .profile-summary-row .lbl { color: var(--muted); }
  .profile-summary-row .val { color: var(--white); font-weight: 500; text-align: right; max-width: 60%; }

  .review-card { padding: 14px 16px; background: var(--deep); border: 1px solid var(--border); border-radius: var(--radius-sm); margin-bottom: 12px; }
  .stars { color: var(--amber); font-size: 13px; }

  .loading-state { text-align: center; padding: 80px 0; color: var(--muted); }
.niche-chip { display:inline-flex; align-items:center; gap:6px; font-size:12px; padding:5px 12px; border-radius:50px; background:var(--amber-glow); border:1px solid rgba(245,166,35,0.2); color:var(--amber); margin:4px 6px 0 0; }
.portfolio-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:16px; margin-top:16px; }
.portfolio-card { background:var(--deep); border:1px solid var(--border); border-radius:var(--radius-sm); padding:16px; }
.portfolio-card h4 { font-size:14px; color:var(--white); margin-bottom:6px; }
.portfolio-card a { font-size:12px; color:var(--amber); text-decoration:none; word-break:break-all; }
.perf-row { display:flex; justify-content:space-between; margin-top:10px; padding-top:10px; border-top:1px solid var(--border); font-size:12px; }
.perf-stat .v { font-family:var(--font-display); font-size:16px; font-weight:700; color:var(--white); }
.perf-stat .l { color:var(--muted); font-size:10px; text-transform:uppercase; }
.campaign-card { background:var(--deep); border:1px solid var(--border); border-radius:var(--radius-sm); padding:18px; margin-bottom:14px; display:flex; justify-content:space-between; align-items:center; gap:16px; flex-wrap:wrap; }
.campaign-card h3 { font-size:15px; color:var(--white); margin-bottom:4px; }
.campaign-budget { color:var(--amber); font-weight:700; font-family:var(--font-display); font-size:16px; }
.btn-apply { background:var(--amber); border:none; color:#000; font-family:var(--font-display); font-weight:700; font-size:13px; padding:9px 18px; border-radius:50px; cursor:pointer; }
.btn-apply:disabled { opacity:0.5; cursor:not-allowed; }
.escrow-badge { display:inline-flex; align-items:center; gap:4px; font-size:11px; font-weight:600; padding:3px 10px; border-radius:50px; }
.escrow-badge.locked { background:rgba(245,166,35,0.1); border:1px solid rgba(245,166,35,0.2); color:var(--amber); }
.escrow-badge.released { background:rgba(74,222,128,0.1); border:1px solid rgba(74,222,128,0.2); color:var(--green); }
.form-inline { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:12px; }
.form-inline input { grid-column:span 1; background:var(--card2); border:1px solid var(--border2); border-radius:8px; padding:9px 12px; color:var(--white); font-size:13px; outline:none; }
.form-inline input:focus { border-color:var(--amber); }
  /* @media (max-width: 1024px) {
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
    .dashboard-row { grid-template-columns: 1fr; }
  }
  @media (max-width: 768px) {
    aside { display: none; }
    main { margin-left: 0; padding-top: 20px; }
    .stats-grid { grid-template-columns: 1fr; }
  } */
  /* Hamburger button — hidden on desktop */
.hamburger-btn {
  display: none;
  width: 40px; height: 40px;
  background: var(--card);
  border: 1px solid var(--border2);
  border-radius: 10px;
  color: var(--white);
  font-size: 18px;
  cursor: pointer;
  flex-shrink: 0;
}

.sidebar-backdrop {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 15;
}
.sidebar-backdrop.open { display: block; }

@media (max-width: 1024px) {
  .stats-grid { grid-template-columns: repeat(2, 1fr); }
  .dashboard-row { grid-template-columns: 1fr; }
}

@media (max-width: 768px) {
  .hamburger-btn { display: block; }

  aside {
    display: flex; /* keep it in DOM, just slide off-screen */
    transform: translateX(-100%);
    transition: transform 0.25s ease;
    width: 240px;
    z-index: 20;
  }
  aside.open { transform: translateX(0); }

  main { margin-left: 0; padding: 20px 16px; }

  .stats-grid { grid-template-columns: 1fr 1fr; gap: 12px; }
  .stat-value { font-size: 22px; }

  header.page-header { flex-wrap: wrap; }
  .header-actions { width: 100%; justify-content: space-between; }

  .form-inline { grid-template-columns: 1fr; }

  .campaign-card { flex-direction: column; align-items: flex-start; }
  .btn-apply { width: 100%; }

  .thread-window { height: 65vh; }
  .msg-bubble { max-width: 85%; }

  .notif-panel { width: 90vw; right: -10px; }

  table.data-table { display: block; overflow-x: auto; white-space: nowrap; }

  .portfolio-grid { grid-template-columns: 1fr; }
}

@media (max-width: 420px) {
  .stats-grid { grid-template-columns: 1fr; }
  h1 { font-size: 22px; }
}
</style>
</head>
<body>

<aside>
  <a class="side-logo" href="index.html">Few<span>sion</span></a>
  <ul class="side-menu" id="sideMenu">
  <li><a href="#overview" data-route="overview">🎞️ Video Workspace</a></li>
  <li><a href="#portfolio" data-route="portfolio">🎯 Portfolio & Niches</a></li>
  <li><a href="#campaigns" data-route="campaigns">📋 Browse Campaigns</a></li>
  <li><a href="#payments" data-route="payments">💳 Payout History</a></li>
  <li><a href="#messages" data-route="messages">💬 Feedback Threads</a></li>
  <li><a href="#reviews" data-route="reviews">⭐ Reviews</a></li>
  <li><a href="#settings" data-route="settings">⚙️ Profile Settings</a></li>
</ul>
  <div class="side-footer">
    <div class="user-badge">
      <div class="user-avatar" id="userAvatar">--</div>
      <div class="user-info">
        <div class="name" id="userName">Loading…</div>
        <div class="role" id="userRole"></div>
      </div>
    </div>
    <button id="logoutBtn" class="logout-btn">🚪 Log Out Account</button>
  </div>
</aside>

<main>
  <header class="page-header">
    <div style="display:flex;align-items:center;gap:14px">
      <button class="hamburger-btn" id="hamburgerBtn" aria-label="Open menu">☰</button>
      <div>
        <h1 id="pageTitle">Editor Pipeline</h1>
        <p style="color: var(--muted); font-size: 14px; margin-top: 4px;" id="pageSubtitle">Grab newly uploaded raw assets and push final render links.</p>
      </div>
    </div>
    <div class="header-actions">
      <div class="bell-wrap">
        <button class="bell-btn" id="bellBtn"><span class="dot" id="bellDot"></span>🔔</button>
        <div class="notif-panel" id="notifPanel"></div>
      </div>
      <button class="btn-upload" onclick="window.location.href='creators.html'"> Find Creator</button>
    </div>
  </header>

  <div id="viewRoot">
    <div class="loading-state">Loading your workspace...</div>
  </div>
</main>
<div class="sidebar-backdrop" id="sidebarBackdrop"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="fewsion-auth.js"></script>
<script src="fewsion-editor-data.js"></script>
<script>
// ---------------------------------------------------------------------
// Bootstrapping
// ---------------------------------------------------------------------
document.addEventListener("DOMContentLoaded", async () => {
  try {
    const user = await FewsionEditorData.init();
    if (!user) return;

    if (!FewsionEditorData.state.profile) {
      window.location.href = "fewsion_editor_portal.html";
      return;
    }

    hydrateSidebar();
    FewsionEditorData.onChange(onDataChange);
    window.addEventListener("hashchange", route);
    route();
  } catch (err) {
    console.error("Dashboard init failed:", err);
    document.getElementById("viewRoot").innerHTML = `<div class="empty-state-box">Something went wrong loading your dashboard. Please refresh.</div>`;
  }
});

function initials(name) {
  if (!name) return "--";
  return name.trim().split(/\s+/).slice(0, 2).map((w) => w[0].toUpperCase()).join("");
}

function hydrateSidebar() {
  const profile = FewsionEditorData.state.profile;
  const name = profile.editor_name || "Editor";
  document.getElementById("userName").textContent = name;
  document.getElementById("userAvatar").textContent = initials(name);
  document.getElementById("userRole").textContent = profile.city_state || "";
}

function onDataChange(section) {
  updateNavBadges();
  renderNotifPanel();
  const current = currentRoute();
  if (section === "all" || section === current.name) {
    renderRoute(current);
  }
  if (section.startsWith("messages:") && current.name === "messages" && current.params.collabId === section.split(":")[1]) {
    renderRoute(current);
  }
}

function updateNavBadges() {
  const unread = FewsionEditorData.unreadNotificationCount();
  document.getElementById("bellBtn").classList.toggle("has-unread", unread > 0);
}

// ---------------------------------------------------------------------
// Router
// ---------------------------------------------------------------------
  
  function currentRoute() {
  const hash = (window.location.hash || "#overview").slice(1);
  const [name, param] = hash.split("/");
  if (name === "messages" && param) return { name: "messages", params: { collabId: param } };
  return { name: name || "overview", params: {} };
}

function route() {
  const r = currentRoute();
  document.querySelectorAll(".side-menu a").forEach((a) => {
    a.classList.toggle("active", a.dataset.route === r.name);
  });
  renderRoute(r);
}

function renderRoute(r) {
  const titles = {
  overview: ["Editor Pipeline", "Grab newly uploaded raw assets and push final render links."],
  portfolio: ["Portfolio & niches", "Your performance-backed showcase — this is what brands filter and match on."],
  campaigns: ["Browse campaigns", "Open briefs from brands looking for an editor like you."],
  payments: ["Payout history", "Track earnings across every collaboration — funds are escrow-protected until milestones are approved."],
  messages: ["Feedback threads", "Conversations with the brands and creators you're editing for."],
  reviews: ["Reviews", "Feedback left by brands and creators you've worked with."],
  settings: ["Profile settings", "Your public editor profile, as brands and creators see it."],
};
  const [title, subtitle] = titles[r.name] || titles.overview;
  document.getElementById("pageTitle").textContent = title;
  document.getElementById("pageSubtitle").textContent = subtitle;

  const root = document.getElementById("viewRoot");
  switch (r.name) {
      case "portfolio": return renderPortfolioView(root);
  case "campaigns": return renderCampaignsView(root);
    case "payments": return renderPaymentsView(root);
    case "messages": return renderMessagesView(root, r.params.collabId);
    case "reviews": return renderReviewsView(root);
    case "settings": return renderSettingsView(root);
    default: return renderOverview(root);
  }
}

  function renderPortfolioView(root) {
  const p = FewsionEditorData.state.profile;
  const niches = p.edited_creator_niches || [];
  const items = FewsionEditorData.state.portfolioItems || [];

  root.innerHTML = `
    <div class="section-box">
      <h2>Your niches</h2>
      <div>${niches.length ? niches.map(n => `<span class="niche-chip">🏷️ ${escapeHtml(n)}</span>`).join("") : '<span style="color:var(--muted);font-size:13px">No niches tagged yet.</span>'}</div>
      <div style="margin-top:16px"><button class="btn-ghost" onclick="window.location.href='fewsion_editor_portal.html'">Edit niches</button></div>
    </div>

    <div class="section-box">
      <h2>Add a portfolio piece</h2>
      <div class="form-inline">
        <input type="text" id="pfTitle" placeholder="Video title" />
        <input type="url" id="pfLink" placeholder="Link (YouTube/Drive/Reel)" />
        <input type="number" id="pfViews" placeholder="Views" />
        <input type="number" id="pfCtr" placeholder="CTR %" step="0.1" />
        <input type="number" id="pfEngagement" placeholder="Engagement %" step="0.1" />
        <input type="text" id="pfNiche" placeholder="Niche tag (e.g. Fitness)" />
      </div>
      <button class="btn-upload" style="margin-top:14px" id="pfAddBtn">Add to portfolio</button>
      <p id="pfErr" style="color:var(--red);font-size:12px;margin-top:8px;display:none"></p>
    </div>

    <div class="section-box">
      <h2>Portfolio pieces (${items.length})</h2>
      <div id="pfGrid" class="portfolio-grid"></div>
    </div>
  `;

  const grid = document.getElementById("pfGrid");
  if (!items.length) {
    grid.innerHTML = `<div class="empty-state-box" style="grid-column:1/-1">No portfolio pieces yet. Add your best work above — real CTR and engagement numbers here are what get you matched with brands.</div>`;
  } else {
    grid.innerHTML = items.map(portfolioCardHtml).join("");
  }

  document.getElementById("pfAddBtn").addEventListener("click", async () => {
    const title = document.getElementById("pfTitle").value.trim();
    const link = document.getElementById("pfLink").value.trim();
    const views = Number(document.getElementById("pfViews").value) || 0;
    const ctr = Number(document.getElementById("pfCtr").value) || 0;
    const engagement = Number(document.getElementById("pfEngagement").value) || 0;
    const niche = document.getElementById("pfNiche").value.trim();
    const err = document.getElementById("pfErr");

    if (!title || !link) {
      err.textContent = "Title and link are required.";
      err.style.display = "block";
      return;
    }
    err.style.display = "none";

    try {
      if (typeof FewsionEditorData.addPortfolioItem !== "function") {
        throw new Error("Portfolio storage isn't wired up in fewsion-editor-data.js yet.");
      }
      await FewsionEditorData.addPortfolioItem({ title, link, views, ctr, engagement, niche });
      renderPortfolioView(root);
    } catch (e) {
      console.error(e);
      err.textContent = e.message || "Couldn't save portfolio piece.";
      err.style.display = "block";
    }
  });
}

function portfolioCardHtml(item) {
  return `
    <div class="portfolio-card">
      <h4>${escapeHtml(item.title)}</h4>
      ${item.niche ? `<span class="niche-chip">${escapeHtml(item.niche)}</span>` : ""}
      <div style="margin-top:8px"><a href="${item.link}" target="_blank">${escapeHtml(item.link)}</a></div>
      <div class="perf-row">
        <div class="perf-stat"><div class="v">${(item.views || 0).toLocaleString()}</div><div class="l">Views</div></div>
        <div class="perf-stat"><div class="v">${item.ctr || 0}%</div><div class="l">CTR</div></div>
        <div class="perf-stat"><div class="v">${item.engagement || 0}%</div><div class="l">Engagement</div></div>
      </div>
    </div>`;
}

// ---------------------------------------------------------------------
// View: Overview / Video Workspace
// ---------------------------------------------------------------------
function renderOverview(root) {
  const { profile, notifications } = FewsionEditorData.state;
  const active = FewsionEditorData.activeCollaborations();
  const completed = FewsionEditorData.completedCollaborations();
  const revenue = FewsionEditorData.totalRevenue();

  const invites = FewsionEditorData.pendingInvites();

  root.innerHTML = `
    ${invites.length ? `<div class="section-box" style="border-color:var(--amber)"><h2>Pending collab invites (${invites.length})</h2><div id="invitesList"></div></div>` : ""}
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Avg turnaround</div>
        <div class="stat-value" style="font-size:22px">${escapeHtml(profile.turnaround_time || "—")}</div>
        <div class="stat-change up">${profile.availability_status ? "● " + escapeHtml(profile.availability_status) : ""}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Active edits</div>
        <div class="stat-value">${active.length}</div>
        <div class="stat-change" style="color:var(--amber2)">${FewsionEditorData.state.collaborations.length} total assigned</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Completed renders</div>
        <div class="stat-value">${completed.length}</div>
        <div class="stat-change up">${profile.ai_grade ? "Grade: " + escapeHtml(profile.ai_grade) : ""}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Milestone revenue</div>
        <div class="stat-value" style="font-size:20px;color:var(--amber)">₹${revenue.toLocaleString()}</div>
      </div>
    </div>

    <div class="dashboard-row">
      <div class="section-box">
        <h2>Active video timelines</h2>
        <div id="timelineList"></div>
      </div>
      <div class="section-box">
        <h2>Project notifications</h2>
        <div id="notificationList"></div>
      </div>
    </div>
  `;

  if (invites.length) {
    const invitesEl = document.getElementById("invitesList");
    invitesEl.innerHTML = "";
    invites.forEach((c) => {
      const row = document.createElement("div");
      row.className = "pipeline-item";
      row.innerHTML = `
        <div class="pipeline-info">
          <h3>${escapeHtml(c.campaign_title || "Untitled campaign")}</h3>
          <div class="pipeline-meta"><span>Brand: ${escapeHtml(c.brand_name || "Brand")}</span></div>
        </div>
        <div style="display:flex;gap:8px">
          <button class="action-btn-approve" style="background:rgba(74,222,128,0.1);border:1px solid rgba(74,222,128,0.3);color:var(--green);font-size:12px;font-weight:600;padding:6px 14px;border-radius:50px;cursor:pointer">Accept</button>
          <button class="action-btn-reject" style="background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);color:var(--red);font-size:12px;font-weight:600;padding:6px 14px;border-radius:50px;cursor:pointer">Decline</button>
        </div>
      `;
      const [acceptBtn, declineBtn] = row.querySelectorAll("button");
      acceptBtn.addEventListener("click", async () => {
        acceptBtn.disabled = true; declineBtn.disabled = true;
        try { await FewsionEditorData.respondToInvite(c.id, true); }
        catch (err) { console.error(err); alert("Couldn't accept the invite."); acceptBtn.disabled = false; declineBtn.disabled = false; }
      });
      declineBtn.addEventListener("click", async () => {
        acceptBtn.disabled = true; declineBtn.disabled = true;
        try { await FewsionEditorData.respondToInvite(c.id, false); }
        catch (err) { console.error(err); alert("Couldn't decline the invite."); acceptBtn.disabled = false; declineBtn.disabled = false; }
      });
      invitesEl.appendChild(row);
    });
  }

  const timelineEl = document.getElementById("timelineList");
  if (!FewsionEditorData.state.collaborations.length) {
    timelineEl.innerHTML = `<div class="empty-state-box">No assigned edits yet. Once a brand assigns you to a collaboration, it'll show up here.</div>`;
  } else {
    timelineEl.innerHTML = "";
    FewsionEditorData.state.collaborations.forEach((c) => timelineEl.appendChild(pipelineRowEl(c)));
  }

  const notifEl = document.getElementById("notificationList");
  notifEl.innerHTML = notifications.length
    ? notifications.slice(0, 6).map(notifItemHtml).join("")
    : `<div class="empty-state-box">No notifications yet.</div>`;
}

function pipelineRowEl(c) {
  const status = (c.status || "Active");
  const deadline = c.deadline ? new Date(c.deadline).toLocaleDateString() : null;
  const row = document.createElement("div");
  row.className = "pipeline-item";
  row.innerHTML = `
    <div class="pipeline-info">
      <h3>${escapeHtml(c.campaign_title || "Untitled campaign")}</h3>
      <div class="pipeline-meta">
        <span>Brand: ${escapeHtml(c.brand_name || "Brand")}</span>
        <span class="status-tag ${status.toLowerCase()}">${escapeHtml(status)}</span>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:10px">
      <div style="font-size:13px;color:var(--muted);font-weight:600">${deadline ? "Due " + deadline : ""}</div>
      <button class="btn-ghost" onclick="window.location.hash='#messages/${c.id}'">Message</button>
    </div>
  `;
  return row;
}

function notifItemHtml(n) {
  return `
    <div class="feed-item">
      <div class="feed-icon">${n.is_read ? "✓" : "🔔"}</div>
      <div class="feed-text">
        <span>${escapeHtml(n.title || "Notification")}</span>${n.message ? " — " + escapeHtml(n.message) : ""}
        <div class="feed-time">${n.created_at ? new Date(n.created_at).toLocaleString() : ""}</div>
      </div>
    </div>`;
}

// ---------------------------------------------------------------------
// View: Payments / Payout History
// ---------------------------------------------------------------------
function renderPaymentsView(root) {
  const { payments, collaborations } = FewsionEditorData.state;
  const total = FewsionEditorData.totalRevenue();
  const released = FewsionEditorData.totalRevenue(true);

  root.innerHTML = `
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-label">Total logged</div><div class="stat-value" style="font-size:22px;color:var(--amber)">₹${total.toLocaleString()}</div></div>
      <div class="stat-card"><div class="stat-label">Released</div><div class="stat-value" style="font-size:22px;color:var(--green)">₹${released.toLocaleString()}</div></div>
      <div class="stat-card"><div class="stat-label">Pending</div><div class="stat-value" style="font-size:22px">₹${(total - released).toLocaleString()}</div></div>
    </div>
    <div class="section-box">
      <h2>Payment history</h2>
      <div id="paymentsTableWrap"></div>
    </div>
  `;

  const wrap = document.getElementById("paymentsTableWrap");
  if (!payments.length) {
    wrap.innerHTML = `<div class="empty-state-box">No payments logged yet.</div>`;
    return;
  }
  wrap.innerHTML = `
    <table class="data-table">
      <thead><tr><th>Amount</th><th>Status</th><th>Campaign</th><th>Released</th></tr></thead>
      <tbody>
        ${payments.map((p) => {
          const collab = collaborations.find((c) => c.id === p.collaboration_id);
          return `
            <tr>
              <td>
  <span class="status-tag ${p.status === "released" ? "completed" : ""}">${escapeHtml(p.status || "pending")}</span>
  <span class="escrow-badge ${p.escrow_status === "released" ? "released" : "locked"}">
    ${p.escrow_status === "released" ? "🔓 Escrow released" : "🔒 Escrow held"}
  </span>
</td>
            </tr>`;
        }).join("")}
      </tbody>
    </table>
  `;
}

// ---------------------------------------------------------------------
// View: Messages / Feedback threads
// ---------------------------------------------------------------------
function renderMessagesView(root, collabId) {
  const { collaborations } = FewsionEditorData.state;

  if (!collabId) {
    root.innerHTML = `<div class="section-box"><h2>Conversations</h2><div class="thread-list" id="threadList"></div></div>`;
    const list = document.getElementById("threadList");
    if (!collaborations.length) {
      list.innerHTML = `<div class="empty-state-box">Feedback threads open up once you're assigned to a collaboration.</div>`;
      return;
    }
    list.innerHTML = "";
    collaborations.forEach((c) => {
      const row = document.createElement("div");
      row.className = "thread-row";
      row.innerHTML = `
        <div>
          <div style="font-size:14px;font-weight:600;color:var(--white)">${escapeHtml(c.brand_name || "Brand partner")}</div>
          <div style="font-size:12px;color:var(--muted)">${escapeHtml(c.campaign_title || "Untitled campaign")}</div>
        </div>
        <span style="color:var(--muted);font-size:13px">Open →</span>
      `;
      row.addEventListener("click", () => { window.location.hash = `#messages/${c.id}`; });
      list.appendChild(row);
    });
    return;
  }

  root.innerHTML = `
    <button class="back-link" onclick="window.location.hash='#messages'">← All conversations</button>
    <div class="thread-window">
      <div class="thread-messages" id="threadMessages"><div class="empty-state-box">Loading conversation...</div></div>
      <div class="thread-input-row">
        <input type="text" id="threadInput" placeholder="Type a message..." />
        <button id="threadSendBtn">Send</button>
      </div>
    </div>
  `;

  const currentUser = FewsionEditorData.getUser();

  async function refreshThread() {
    const msgs = FewsionEditorData.state.messages[collabId] || (await FewsionEditorData.loadMessages(collabId));
    const el = document.getElementById("threadMessages");
    if (!el) return;
    if (!msgs.length) {
      el.innerHTML = `<div class="empty-state-box">No messages yet. Say hello!</div>`;
    } else {
      el.innerHTML = msgs.map((m) => `
        <div class="msg-bubble ${m.sender_id === currentUser.id ? "mine" : "theirs"}">
          ${escapeHtml(m.content)}
          <div class="msg-time">${new Date(m.created_at).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" })}</div>
        </div>
      `).join("");
    }
    el.scrollTop = el.scrollHeight;
  }
  refreshThread();

  const sendBtn = document.getElementById("threadSendBtn");
  const input = document.getElementById("threadInput");
  async function send() {
    const val = input.value;
    if (!val.trim()) return;
    input.value = "";
    try {
      await FewsionEditorData.sendMessage(collabId, val);
      refreshThread();
    } catch (err) {
      console.error(err);
      alert("Message failed to send.");
    }
  }
  sendBtn.addEventListener("click", send);
  input.addEventListener("keydown", (e) => { if (e.key === "Enter") send(); });
}

// ---------------------------------------------------------------------
// View: Reviews (performance rating / reputation)
// ---------------------------------------------------------------------
function renderReviewsView(root) {
  const { reviews } = FewsionEditorData.state;
  const avg = FewsionEditorData.averageRating();

  root.innerHTML = `
    <div class="stats-grid" style="grid-template-columns: repeat(2, 1fr)">
      <div class="stat-card"><div class="stat-label">Average rating</div><div class="stat-value">${avg || "--"}<span style="font-size:16px;color:var(--muted)">/5</span></div></div>
      <div class="stat-card"><div class="stat-label">Total reviews</div><div class="stat-value">${reviews.length}</div></div>
    </div>
    <div class="section-box"><h2>All reviews</h2><div id="reviewList"></div></div>
  `;
  const list = document.getElementById("reviewList");
  if (!reviews.length) {
    list.innerHTML = `<div class="empty-state-box">No reviews yet. They'll appear here after you complete a collaboration — this is what builds your long-term reputation on Fewsion.</div>`;
    return;
  }
  list.innerHTML = reviews.map((r) => `
    <div class="review-card">
      <div class="stars">${"★".repeat(r.rating || 0)}${"☆".repeat(5 - (r.rating || 0))}</div>
      <p style="font-size:13.5px;margin-top:8px;color:var(--text)">${escapeHtml(r.review || "No written feedback provided.")}</p>
    </div>
  `).join("");
}

// ---------------------------------------------------------------------
// View: Profile Settings (read-only summary + link to edit)
// ---------------------------------------------------------------------
function renderSettingsView(root) {
  const p = FewsionEditorData.state.profile;
  const rows = [
    ["Editor name", p.editor_name],
    ["City / state", p.city_state],
    ["Experience", p.experience_duration],
    ["Bio", p.one_line_bio],
    ["Languages", (p.languages || []).join(", ")],
    ["Specialised formats", (p.specialised_formats || []).join(", ")],
    ["Primary software", (p.primary_software || []).join(", ")],
    ["Special skills", (p.special_skills || []).join(", ")],
    ["Creator niches edited for", (p.edited_creator_niches || []).join(", ")],
    ["Total videos edited", p.total_videos_edited],
    ["Turnaround time", p.turnaround_time],
    ["Availability", p.availability_status],
    ["Rate (short-form)", p.rate_short_form],
    ["Portfolio", p.portfolio_url],
    ["AI score", p.ai_total_score != null ? `${p.ai_total_score}/100 (${p.ai_grade || "—"})` : "—"],
  ];

  root.innerHTML = `
    <div class="section-box">
      <h2>Your profile</h2>
      ${rows.map(([label, val]) => `
        <div class="profile-summary-row">
          <span class="lbl">${escapeHtml(label)}</span>
          <span class="val">${val ? escapeHtml(String(val)) : "—"}</span>
        </div>
      `).join("")}
      <div style="margin-top:20px">
        <button class="btn-upload" onclick="window.location.href='fewsion_editor_portal.html?edit=true'">Edit profile →</button>
      </div>
    </div>
  `;
}

// ---------------------------------------------------------------------
// Notifications panel
// ---------------------------------------------------------------------
function renderNotifPanel() {
  const panel = document.getElementById("notifPanel");
  const notifications = FewsionEditorData.state.notifications;
  if (!notifications.length) {
    panel.innerHTML = `<div class="empty-state-box" style="border:none;padding:20px">No notifications yet.</div>`;
    return;
  }
  panel.innerHTML = notifications.slice(0, 15).map(notifItemHtml).join("");
}

document.getElementById("bellBtn").addEventListener("click", async (e) => {
  e.stopPropagation();
  const panel = document.getElementById("notifPanel");
  panel.classList.toggle("open");
  if (panel.classList.contains("open")) {
    await FewsionEditorData.markNotificationsRead();
  }
});
document.addEventListener("click", (e) => {
  const panel = document.getElementById("notifPanel");
  if (!panel.contains(e.target) && e.target.id !== "bellBtn") panel.classList.remove("open");
});

// ---------------------------------------------------------------------
// Logout
// ---------------------------------------------------------------------
document.getElementById("logoutBtn").addEventListener("click", async () => {
  if (!confirm("Are you sure you want to log out of Fewsion?")) return;
  try {
    document.body.style.opacity = "0.3";
    document.body.style.transition = "opacity 0.2s ease";
    localStorage.clear();
    sessionStorage.clear();
    await FewsionAuth.signOut("login.html");
  } catch (err) {
    document.body.style.opacity = "1";
    console.error("Logout runtime failure:", err);
    alert("Error logging out. Please try again.");
  }
});

  async function renderCampaignsView(root) {
  root.innerHTML = `<div class="section-box"><h2>Open campaigns</h2><div id="campaignList"><div class="empty-state-box">Loading campaigns...</div></div></div>`;
  const listEl = document.getElementById("campaignList");

  try {
    if (typeof FewsionEditorData.loadOpenCampaigns !== "function") {
      throw new Error("loadOpenCampaigns() isn't implemented in fewsion-editor-data.js yet.");
    }
    const campaigns = await FewsionEditorData.loadOpenCampaigns();
    if (!campaigns.length) {
      listEl.innerHTML = `<div class="empty-state-box">No open campaigns right now. Check back soon.</div>`;
      return;
    }
    listEl.innerHTML = "";
    campaigns.forEach((c) => listEl.appendChild(campaignCardEl(c)));
  } catch (err) {
    console.error(err);
    listEl.innerHTML = `<div class="empty-state-box">Couldn't load campaigns: ${escapeHtml(err.message)}</div>`;
  }
}

function campaignCardEl(c) {
  const el = document.createElement("div");
  el.className = "campaign-card";
  const alreadyApplied = c.already_applied;
  el.innerHTML = `
    <div>
      <h3>${escapeHtml(c.title || "Untitled campaign")}</h3>
      <div style="color:var(--muted);font-size:12px">${escapeHtml(c.brand_name || "Brand")} • ${escapeHtml((c.niches || []).join(", "))}</div>
      <div class="campaign-budget" style="margin-top:6px">₹${Number(c.budget || 0).toLocaleString()}</div>
    </div>
    <button class="btn-apply" ${alreadyApplied ? "disabled" : ""}>${alreadyApplied ? "Applied ✓" : "Apply"}</button>
  `;
  const btn = el.querySelector("button");
  if (!alreadyApplied) {
    btn.addEventListener("click", async () => {
      btn.disabled = true;
      btn.textContent = "Applying...";
      try {
        await FewsionEditorData.applyToCampaign(c.id);
        btn.textContent = "Applied ✓";
      } catch (err) {
        console.error(err);
        alert("Couldn't apply: " + err.message);
        btn.disabled = false;
        btn.textContent = "Apply";
      }
    });
  }
  return el;
}

// ---------------------------------------------------------------------
// Utils
// ---------------------------------------------------------------------
function escapeHtml(str) {
  if (str === null || str === undefined) return "";
  return String(str).replace(/[&<>"']/g, (m) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[m]));
}
  const asideEl = document.querySelector("aside");
const backdrop = document.getElementById("sidebarBackdrop");
const hamburgerBtn = document.getElementById("hamburgerBtn");

function openSidebar() {
  asideEl.classList.add("open");
  backdrop.classList.add("open");
}
function closeSidebar() {
  asideEl.classList.remove("open");
  backdrop.classList.remove("open");
}

hamburgerBtn.addEventListener("click", openSidebar);
backdrop.addEventListener("click", closeSidebar);

// Close sidebar automatically when a nav link is tapped (mobile)
document.querySelectorAll(".side-menu a").forEach((a) => {
  a.addEventListener("click", () => { if (window.innerWidth <= 768) closeSidebar(); });
});
</script>

  .btn-upload { background: var(--amber); color: #000; font-family: var(--font-display); font-size: 14px; font-weight: 700; padding: 10px 20px; border-radius: 50px; text-decoration: none; display: inline-flex; align-items: center; gap: 8px; transition: transform 0.2s; border: none; cursor: pointer; }
  .btn-upload:hover { transform: translateY(-1px); }
  .btn-ghost { background: var(--card); border: 1px solid var(--border2); color: var(--text); font-size: 13px; font-weight: 600; padding: 9px 16px; border-radius: 50px; cursor: pointer; }
  .btn-ghost:hover { border-color: var(--white); color: var(--white); }

  .bell-wrap { position: relative; }
  .bell-btn { width: 40px; height: 40px; border-radius: 50%; background: var(--card); border: 1px solid var(--border2); color: var(--text); cursor: pointer; font-size: 16px; position: relative; }
  .bell-btn .dot { position: absolute; top: 6px; right: 7px; width: 8px; height: 8px; background: var(--amber); border-radius: 50%; display: none; }
  .bell-btn.has-unread .dot { display: block; }
  .notif-panel { display: none; position: absolute; right: 0; top: 48px; width: 340px; max-height: 420px; overflow-y: auto; background: var(--card); border: 1px solid var(--border2); border-radius: var(--radius-sm); box-shadow: 0 12px 40px rgba(0,0,0,0.5); z-index: 30; padding: 12px; }
  .notif-panel.open { display: block; }

  .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 40px; }
  .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; }
  .stat-label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
  .stat-value { font-family: var(--font-display); font-size: 32px; font-weight: 800; color: var(--white); }
  .stat-change { font-size: 12px; margin-top: 4px; display: flex; align-items: center; gap: 4px; }
  .stat-change.up { color: var(--green); }

  .dashboard-row { display: grid; grid-template-columns: 2fr 1fr; gap: 32px; }
  .section-box { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px; margin-bottom: 32px; }
  .section-box h2 { font-family: var(--font-display); font-size: 18px; font-weight: 700; color: var(--white); margin-bottom: 20px; }

  .pipeline-item { display: flex; align-items: center; justify-content: space-between; padding: 16px; background: var(--deep); border: 1px solid var(--border); border-radius: var(--radius-sm); margin-bottom: 12px; }
  .pipeline-info h3 { font-size: 15px; font-weight: 600; color: var(--white); margin-bottom: 4px; }
  .pipeline-meta { font-size: 12px; color: var(--muted); display: flex; gap: 14px; align-items: center; flex-wrap: wrap; }
  .status-tag { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 50px; text-transform: capitalize; background: rgba(245,166,35,0.1); border: 1px solid rgba(245,166,35,0.2); color: var(--amber); }
  .status-tag.completed, .status-tag.delivered { background: rgba(74,222,128,0.1); border: 1px solid rgba(74,222,128,0.2); color: var(--green); }
  .status-tag.revision { background: rgba(255,107,53,0.1); border: 1px solid rgba(255,107,53,0.2); color: var(--amber2); }

  .empty-state-box { padding: 32px; text-align: center; color: var(--muted); border: 1px dashed var(--border2); border-radius: var(--radius-sm); font-size: 14px; }

  .feed-item { display: flex; gap: 12px; font-size: 13.5px; line-height: 1.5; padding-bottom: 16px; border-bottom: 1px solid var(--border); margin-bottom: 16px; }
  .feed-item:last-child { border: none; margin-bottom: 0; padding-bottom: 0; }
  .feed-icon { width: 24px; height: 24px; background: var(--amber-glow); border: 1px solid rgba(245,166,35,0.2); color: var(--amber); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; flex-shrink: 0; }
  .feed-text span { color: var(--white); font-weight: 500; }
  .feed-time { font-size: 11px; color: var(--muted2); margin-top: 2px; }

  table.data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  table.data-table th { text-align: left; color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; padding: 10px 12px; border-bottom: 1px solid var(--border2); }
  table.data-table td { padding: 12px; border-bottom: 1px solid var(--border); color: var(--text); }
  table.data-table tr:last-child td { border-bottom: none; }

  .back-link { display: inline-flex; align-items: center; gap: 6px; color: var(--muted); font-size: 13px; text-decoration: none; cursor: pointer; margin-bottom: 20px; background: none; border: none; }
  .back-link:hover { color: var(--white); }

  .thread-list { display: flex; flex-direction: column; gap: 8px; }
  .thread-row { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; background: var(--deep); border: 1px solid var(--border); border-radius: var(--radius-sm); cursor: pointer; }
  .thread-row:hover { border-color: var(--border2); }
  .thread-window { display: flex; flex-direction: column; height: 480px; background: var(--deep); border: 1px solid var(--border); border-radius: var(--radius-sm); overflow: hidden; }
  .thread-messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
  .msg-bubble { max-width: 70%; padding: 10px 14px; border-radius: 14px; font-size: 13.5px; line-height: 1.5; }
  .msg-bubble.mine { align-self: flex-end; background: var(--amber); color: #000; }
  .msg-bubble.theirs { align-self: flex-start; background: var(--card2); color: var(--text); }
  .msg-time { font-size: 10px; opacity: 0.6; margin-top: 4px; }
  .thread-input-row { display: flex; gap: 8px; padding: 14px; border-top: 1px solid var(--border); }
  .thread-input-row input { flex: 1; background: var(--card2); border: 1px solid var(--border2); border-radius: 50px; padding: 10px 16px; color: var(--white); font-size: 13px; outline: none; }
  .thread-input-row button { background: var(--amber); border: none; color: #000; font-weight: 700; padding: 10px 20px; border-radius: 50px; cursor: pointer; font-size: 13px; }

  .profile-summary-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--border); font-size: 13.5px; }
  .profile-summary-row:last-child { border-bottom: none; }
  .profile-summary-row .lbl { color: var(--muted); }
  .profile-summary-row .val { color: var(--white); font-weight: 500; text-align: right; max-width: 60%; }

  .review-card { padding: 14px 16px; background: var(--deep); border: 1px solid var(--border); border-radius: var(--radius-sm); margin-bottom: 12px; }
  .stars { color: var(--amber); font-size: 13px; }

  .loading-state { text-align: center; padding: 80px 0; color: var(--muted); }

  @media (max-width: 1024px) {
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
    .dashboard-row { grid-template-columns: 1fr; }
  }
  @media (max-width: 768px) {
    aside { display: none; }
    main { margin-left: 0; padding-top: 20px; }
    .stats-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<aside>
  <a class="side-logo" href="#overview">Few<span>sion</span></a>
  <ul class="side-menu" id="sideMenu">
    <li><a href="#overview" data-route="overview">🎞️ Video Workspace</a></li>
    <li><a href="#payments" data-route="payments">💳 Payout History</a></li>
    <li><a href="#messages" data-route="messages">💬 Feedback Threads</a></li>
    <li><a href="#reviews" data-route="reviews">⭐ Reviews</a></li>
    <li><a href="#settings" data-route="settings">⚙️ Profile Settings</a></li>
  </ul>
  <div class="side-footer">
    <div class="user-badge">
      <div class="user-avatar" id="userAvatar">--</div>
      <div class="user-info">
        <div class="name" id="userName">Loading…</div>
        <div class="role" id="userRole"></div>
      </div>
    </div>
    <button id="logoutBtn" class="logout-btn">🚪 Log Out Account</button>
  </div>
</aside>

<main>
  <header class="page-header">
    <div>
      <h1 id="pageTitle">Editor Pipeline</h1>
      <p style="color: var(--muted); font-size: 14px; margin-top: 4px;" id="pageSubtitle">Grab newly uploaded raw assets and push final render links.</p>
    </div>
    <div class="header-actions">
      <div class="bell-wrap">
        <button class="bell-btn" id="bellBtn"><span class="dot" id="bellDot"></span>🔔</button>
        <div class="notif-panel" id="notifPanel"></div>
      </div>
      <button class="btn-upload" onclick="window.location.href='creators.html'"> Find Creator</button>
    </div>
  </header>

  <div id="viewRoot">
    <div class="loading-state">Loading your workspace...</div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="fewsion-auth.js"></script>
<script src="fewsion-editor-data.js"></script>
<script>
// ---------------------------------------------------------------------
// Bootstrapping
// ---------------------------------------------------------------------
document.addEventListener("DOMContentLoaded", async () => {
  try {
    const user = await FewsionEditorData.init();
    if (!user) return;

    if (!FewsionEditorData.state.profile) {
      window.location.href = "fewsion_editor_portal.html";
      return;
    }

    hydrateSidebar();
    FewsionEditorData.onChange(onDataChange);
    window.addEventListener("hashchange", route);
    route();
  } catch (err) {
    console.error("Dashboard init failed:", err);
    document.getElementById("viewRoot").innerHTML = `<div class="empty-state-box">Something went wrong loading your dashboard. Please refresh.</div>`;
  }
});

function initials(name) {
  if (!name) return "--";
  return name.trim().split(/\s+/).slice(0, 2).map((w) => w[0].toUpperCase()).join("");
}

function hydrateSidebar() {
  const profile = FewsionEditorData.state.profile;
  const name = profile.editor_name || "Editor";
  document.getElementById("userName").textContent = name;
  document.getElementById("userAvatar").textContent = initials(name);
  document.getElementById("userRole").textContent = profile.city_state || "";
}

function onDataChange(section) {
  updateNavBadges();
  renderNotifPanel();
  const current = currentRoute();
  if (section === "all" || section === current.name) {
    renderRoute(current);
  }
  if (section.startsWith("messages:") && current.name === "messages" && current.params.collabId === section.split(":")[1]) {
    renderRoute(current);
  }
}

function updateNavBadges() {
  const unread = FewsionEditorData.unreadNotificationCount();
  document.getElementById("bellBtn").classList.toggle("has-unread", unread > 0);
}

// ---------------------------------------------------------------------
// Router
// ---------------------------------------------------------------------
function currentRoute() {
  const hash = (window.location.hash || "#overview").slice(1);
  const [name, param] = hash.split("/");
  if (name === "messages" && param) return { name: "messages", params: { collabId: param } };
  return { name: name || "overview", params: {} };
}

function route() {
  const r = currentRoute();
  document.querySelectorAll(".side-menu a").forEach((a) => {
    a.classList.toggle("active", a.dataset.route === r.name);
  });
  renderRoute(r);
}

function renderRoute(r) {
  const titles = {
    overview: ["Editor Pipeline", "Grab newly uploaded raw assets and push final render links."],
    payments: ["Payout history", "Track earnings across every collaboration."],
    messages: ["Feedback threads", "Conversations with the brands and creators you're editing for."],
    reviews: ["Reviews", "Feedback left by brands and creators you've worked with."],
    settings: ["Profile settings", "Your public editor profile, as brands and creators see it."],
  };
  const [title, subtitle] = titles[r.name] || titles.overview;
  document.getElementById("pageTitle").textContent = title;
  document.getElementById("pageSubtitle").textContent = subtitle;

  const root = document.getElementById("viewRoot");
  switch (r.name) {
    case "payments": return renderPaymentsView(root);
    case "messages": return renderMessagesView(root, r.params.collabId);
    case "reviews": return renderReviewsView(root);
    case "settings": return renderSettingsView(root);
    default: return renderOverview(root);
  }
}

// ---------------------------------------------------------------------
// View: Overview / Video Workspace
// ---------------------------------------------------------------------
function renderOverview(root) {
  const { profile, notifications } = FewsionEditorData.state;
  const active = FewsionEditorData.activeCollaborations();
  const completed = FewsionEditorData.completedCollaborations();
  const revenue = FewsionEditorData.totalRevenue();

  const invites = FewsionEditorData.pendingInvites();

  root.innerHTML = `
    ${invites.length ? `<div class="section-box" style="border-color:var(--amber)"><h2>Pending collab invites (${invites.length})</h2><div id="invitesList"></div></div>` : ""}
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Avg turnaround</div>
        <div class="stat-value" style="font-size:22px">${escapeHtml(profile.turnaround_time || "—")}</div>
        <div class="stat-change up">${profile.availability_status ? "● " + escapeHtml(profile.availability_status) : ""}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Active edits</div>
        <div class="stat-value">${active.length}</div>
        <div class="stat-change" style="color:var(--amber2)">${FewsionEditorData.state.collaborations.length} total assigned</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Completed renders</div>
        <div class="stat-value">${completed.length}</div>
        <div class="stat-change up">${profile.ai_grade ? "Grade: " + escapeHtml(profile.ai_grade) : ""}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Milestone revenue</div>
        <div class="stat-value" style="font-size:20px;color:var(--amber)">₹${revenue.toLocaleString()}</div>
      </div>
    </div>

    <div class="dashboard-row">
      <div class="section-box">
        <h2>Active video timelines</h2>
        <div id="timelineList"></div>
      </div>
      <div class="section-box">
        <h2>Project notifications</h2>
        <div id="notificationList"></div>
      </div>
    </div>
  `;

  if (invites.length) {
    const invitesEl = document.getElementById("invitesList");
    invitesEl.innerHTML = "";
    invites.forEach((c) => {
      const row = document.createElement("div");
      row.className = "pipeline-item";
      row.innerHTML = `
        <div class="pipeline-info">
          <h3>${escapeHtml(c.campaign_title || "Untitled campaign")}</h3>
          <div class="pipeline-meta"><span>Brand: ${escapeHtml(c.brand_name || "Brand")}</span></div>
        </div>
        <div style="display:flex;gap:8px">
          <button class="action-btn-approve" style="background:rgba(74,222,128,0.1);border:1px solid rgba(74,222,128,0.3);color:var(--green);font-size:12px;font-weight:600;padding:6px 14px;border-radius:50px;cursor:pointer">Accept</button>
          <button class="action-btn-reject" style="background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);color:var(--red);font-size:12px;font-weight:600;padding:6px 14px;border-radius:50px;cursor:pointer">Decline</button>
        </div>
      `;
      const [acceptBtn, declineBtn] = row.querySelectorAll("button");
      acceptBtn.addEventListener("click", async () => {
        acceptBtn.disabled = true; declineBtn.disabled = true;
        try { await FewsionEditorData.respondToInvite(c.id, true); }
        catch (err) { console.error(err); alert("Couldn't accept the invite."); acceptBtn.disabled = false; declineBtn.disabled = false; }
      });
      declineBtn.addEventListener("click", async () => {
        acceptBtn.disabled = true; declineBtn.disabled = true;
        try { await FewsionEditorData.respondToInvite(c.id, false); }
        catch (err) { console.error(err); alert("Couldn't decline the invite."); acceptBtn.disabled = false; declineBtn.disabled = false; }
      });
      invitesEl.appendChild(row);
    });
  }

  const timelineEl = document.getElementById("timelineList");
  if (!FewsionEditorData.state.collaborations.length) {
    timelineEl.innerHTML = `<div class="empty-state-box">No assigned edits yet. Once a brand assigns you to a collaboration, it'll show up here.</div>`;
  } else {
    timelineEl.innerHTML = "";
    FewsionEditorData.state.collaborations.forEach((c) => timelineEl.appendChild(pipelineRowEl(c)));
  }

  const notifEl = document.getElementById("notificationList");
  notifEl.innerHTML = notifications.length
    ? notifications.slice(0, 6).map(notifItemHtml).join("")
    : `<div class="empty-state-box">No notifications yet.</div>`;
}

function pipelineRowEl(c) {
  const status = (c.status || "Active");
  const deadline = c.deadline ? new Date(c.deadline).toLocaleDateString() : null;
  const row = document.createElement("div");
  row.className = "pipeline-item";
  row.innerHTML = `
    <div class="pipeline-info">
      <h3>${escapeHtml(c.campaign_title || "Untitled campaign")}</h3>
      <div class="pipeline-meta">
        <span>Brand: ${escapeHtml(c.brand_name || "Brand")}</span>
        <span class="status-tag ${status.toLowerCase()}">${escapeHtml(status)}</span>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:10px">
      <div style="font-size:13px;color:var(--muted);font-weight:600">${deadline ? "Due " + deadline : ""}</div>
      <button class="btn-ghost" onclick="window.location.hash='#messages/${c.id}'">Message</button>
    </div>
  `;
  return row;
}

function notifItemHtml(n) {
  return `
    <div class="feed-item">
      <div class="feed-icon">${n.is_read ? "✓" : "🔔"}</div>
      <div class="feed-text">
        <span>${escapeHtml(n.title || "Notification")}</span>${n.message ? " — " + escapeHtml(n.message) : ""}
        <div class="feed-time">${n.created_at ? new Date(n.created_at).toLocaleString() : ""}</div>
      </div>
    </div>`;
}

// ---------------------------------------------------------------------
// View: Payments / Payout History
// ---------------------------------------------------------------------
function renderPaymentsView(root) {
  const { payments, collaborations } = FewsionEditorData.state;
  const total = FewsionEditorData.totalRevenue();
  const released = FewsionEditorData.totalRevenue(true);

  root.innerHTML = `
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-label">Total logged</div><div class="stat-value" style="font-size:22px;color:var(--amber)">₹${total.toLocaleString()}</div></div>
      <div class="stat-card"><div class="stat-label">Released</div><div class="stat-value" style="font-size:22px;color:var(--green)">₹${released.toLocaleString()}</div></div>
      <div class="stat-card"><div class="stat-label">Pending</div><div class="stat-value" style="font-size:22px">₹${(total - released).toLocaleString()}</div></div>
    </div>
    <div class="section-box">
      <h2>Payment history</h2>
      <div id="paymentsTableWrap"></div>
    </div>
  `;

  const wrap = document.getElementById("paymentsTableWrap");
  if (!payments.length) {
    wrap.innerHTML = `<div class="empty-state-box">No payments logged yet.</div>`;
    return;
  }
  wrap.innerHTML = `
    <table class="data-table">
      <thead><tr><th>Amount</th><th>Status</th><th>Campaign</th><th>Released</th></tr></thead>
      <tbody>
        ${payments.map((p) => {
          const collab = collaborations.find((c) => c.id === p.collaboration_id);
          return `
            <tr>
              <td>₹${Number(p.amount || 0).toLocaleString()}</td>
              <td><span class="status-tag ${p.status === "released" ? "completed" : ""}">${escapeHtml(p.status || "pending")}</span></td>
              <td>${collab ? escapeHtml(collab.campaign_title || "Untitled") : "—"}</td>
              <td>${p.released_at ? new Date(p.released_at).toLocaleDateString() : "—"}</td>
            </tr>`;
        }).join("")}
      </tbody>
    </table>
  `;
}

// ---------------------------------------------------------------------
// View: Messages / Feedback threads
// ---------------------------------------------------------------------
function renderMessagesView(root, collabId) {
  const { collaborations } = FewsionEditorData.state;

  if (!collabId) {
    root.innerHTML = `<div class="section-box"><h2>Conversations</h2><div class="thread-list" id="threadList"></div></div>`;
    const list = document.getElementById("threadList");
    if (!collaborations.length) {
      list.innerHTML = `<div class="empty-state-box">Feedback threads open up once you're assigned to a collaboration.</div>`;
      return;
    }
    list.innerHTML = "";
    collaborations.forEach((c) => {
      const row = document.createElement("div");
      row.className = "thread-row";
      row.innerHTML = `
        <div>
          <div style="font-size:14px;font-weight:600;color:var(--white)">${escapeHtml(c.brand_name || "Brand partner")}</div>
          <div style="font-size:12px;color:var(--muted)">${escapeHtml(c.campaign_title || "Untitled campaign")}</div>
        </div>
        <span style="color:var(--muted);font-size:13px">Open →</span>
      `;
      row.addEventListener("click", () => { window.location.hash = `#messages/${c.id}`; });
      list.appendChild(row);
    });
    return;
  }

  root.innerHTML = `
    <button class="back-link" onclick="window.location.hash='#messages'">← All conversations</button>
    <div class="thread-window">
      <div class="thread-messages" id="threadMessages"><div class="empty-state-box">Loading conversation...</div></div>
      <div class="thread-input-row">
        <input type="text" id="threadInput" placeholder="Type a message..." />
        <button id="threadSendBtn">Send</button>
      </div>
    </div>
  `;

  const currentUser = FewsionEditorData.getUser();

  async function refreshThread() {
    const msgs = FewsionEditorData.state.messages[collabId] || (await FewsionEditorData.loadMessages(collabId));
    const el = document.getElementById("threadMessages");
    if (!el) return;
    if (!msgs.length) {
      el.innerHTML = `<div class="empty-state-box">No messages yet. Say hello!</div>`;
    } else {
      el.innerHTML = msgs.map((m) => `
        <div class="msg-bubble ${m.sender_id === currentUser.id ? "mine" : "theirs"}">
          ${escapeHtml(m.content)}
          <div class="msg-time">${new Date(m.created_at).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" })}</div>
        </div>
      `).join("");
    }
    el.scrollTop = el.scrollHeight;
  }
  refreshThread();

  const sendBtn = document.getElementById("threadSendBtn");
  const input = document.getElementById("threadInput");
  async function send() {
    const val = input.value;
    if (!val.trim()) return;
    input.value = "";
    try {
      await FewsionEditorData.sendMessage(collabId, val);
      refreshThread();
    } catch (err) {
      console.error(err);
      alert("Message failed to send.");
    }
  }
  sendBtn.addEventListener("click", send);
  input.addEventListener("keydown", (e) => { if (e.key === "Enter") send(); });
}

// ---------------------------------------------------------------------
// View: Reviews (performance rating / reputation)
// ---------------------------------------------------------------------
function renderReviewsView(root) {
  const { reviews } = FewsionEditorData.state;
  const avg = FewsionEditorData.averageRating();

  root.innerHTML = `
    <div class="stats-grid" style="grid-template-columns: repeat(2, 1fr)">
      <div class="stat-card"><div class="stat-label">Average rating</div><div class="stat-value">${avg || "--"}<span style="font-size:16px;color:var(--muted)">/5</span></div></div>
      <div class="stat-card"><div class="stat-label">Total reviews</div><div class="stat-value">${reviews.length}</div></div>
    </div>
    <div class="section-box"><h2>All reviews</h2><div id="reviewList"></div></div>
  `;
  const list = document.getElementById("reviewList");
  if (!reviews.length) {
    list.innerHTML = `<div class="empty-state-box">No reviews yet. They'll appear here after you complete a collaboration — this is what builds your long-term reputation on Fewsion.</div>`;
    return;
  }
  list.innerHTML = reviews.map((r) => `
    <div class="review-card">
      <div class="stars">${"★".repeat(r.rating || 0)}${"☆".repeat(5 - (r.rating || 0))}</div>
      <p style="font-size:13.5px;margin-top:8px;color:var(--text)">${escapeHtml(r.review || "No written feedback provided.")}</p>
    </div>
  `).join("");
}

document.getElementById("logoutBtn").addEventListener("click", async () => {
  if (!confirm("Are you sure you want to log out of Fewsion?")) return;
  try {
    document.body.style.opacity = "0.3";
    document.body.style.transition = "opacity 0.2s ease";
    localStorage.clear();
    sessionStorage.clear();
    await FewsionAuth.signOut("login.html");

    document.body.style.opacity = "1";
    console.error("Logout runtime failure:", err);
    alert("Error logging out. Please try again.");
  }
});

// ---------------------------------------------------------------------
// Utils
// ---------------------------------------------------------------------
function escapeHtml(str) {
  if (str === null || str === undefined) return "";
  return String(str).replace(/[&<>"']/g, (m) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[m]));
}
