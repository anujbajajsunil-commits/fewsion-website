<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Creator Dashboard — Fewsion</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="fewsion-auth.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #080808; --deep: #0e0e0e; --card: #141414; --card2: #1a1a1a;
    --border: rgba(255,255,255,0.07); --amber: #F5A623; --amber2: #FF6B35;
    --text: #f0ece4; --muted: #888; --white: #ffffff;
    --font-display: 'Syne', sans-serif; --font-body: 'DM Sans', sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--black); color: var(--text); font-family: var(--font-body); display: flex; min-height: 100vh; }
  
  aside { width: 260px; background: var(--deep); border-right: 1px solid var(--border); padding: 32px 24px; position: fixed; top: 0; bottom: 0; display: flex; flex-direction: column; }
  .side-logo { font-family: var(--font-display); font-size: 22px; font-weight: 800; color: var(--white); text-decoration: none; margin-bottom: 40px; display: block; }
  .side-logo span { color: var(--amber); }
  .side-menu { list-style: none; display: flex; flex-direction: column; gap: 8px; }
  .side-menu a { display: block; padding: 12px 16px; color: var(--muted); text-decoration: none; font-size: 14px; border-radius: 8px; }
  .side-menu a.active { background: var(--card); color: var(--white); border-left: 3px solid var(--amber); }
  
  main { margin-left: 260px; flex: 1; padding: 40px 5%; max-width: 1400px; }
  header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
  h1 { font-family: var(--font-display); font-size: 28px; color: var(--white); }
  .btn-browse { background: var(--amber); color: #000; font-weight: 700; padding: 10px 20px; border-radius: 50px; cursor: pointer; border: none; font-family: var(--font-display); }
  
  .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 40px; }
  .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 24px; }
  .stat-label { font-size: 12px; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; }
  .stat-value { font-family: var(--font-display); font-size: 32px; color: var(--white); }
  
  .dashboard-row { display: grid; grid-template-columns: 2fr 1fr; gap: 32px; }
  .section-box { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 28px; }
  .section-box h2 { font-family: var(--font-display); font-size: 18px; color: var(--white); margin-bottom: 20px; }
  
  .campaign-item { padding: 16px; background: var(--deep); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 12px; cursor: pointer; transition: 0.2s; }
  .campaign-item:hover { border-color: var(--amber); }
  .campaign-info h3 { font-size: 15px; color: var(--white); margin-bottom: 4px; }
  .campaign-meta { font-size: 12px; color: var(--amber); }
</style>
</head>
<body>

<aside>
  <a class="side-logo" href="index.html">Few<span>sion</span></a>
  <ul class="side-menu">
    <li><a href="#" class="active">📊 Overview Space</a></li>
    <li><a href="#">📣 My Applications</a></li>
    <li><a href="#">📁 Portfolio Proof</a></li>
    <li><a href="#">⚙️ Creator Settings</a></li>
  </ul>
  <div style="margin-top: auto;">
    <button id="logoutBtn" style="width: 100%; background: #222; color: #fff; padding: 10px; border: none; border-radius: 8px; cursor: pointer;">Log Out</button>
  </div>
</aside>

<main>
  <header>
    <div>
      <h1 id="welcomeHeading">Welcome back</h1>
    </div>
    <button class="btn-browse" onclick="window.location.href='creator_profile_builder.html'">Find Collaboration</button>
  </header>

  <div class="stats-grid">
    <div class="stat-card"><div class="stat-label">Creator Score</div><div class="stat-value" id="cardScore">--</div></div>
    <div class="stat-card"><div class="stat-label">Followers</div><div class="stat-value" id="cardFollowers">--</div></div>
    <div class="stat-card"><div class="stat-label">Engagement</div><div class="stat-value" id="cardEngagement">--%</div></div>
    <div class="stat-card"><div class="stat-label">Location</div><div class="stat-value" id="cardLocation" style="font-size: 22px;">--</div></div>
  </div>

  <div class="dashboard-row">
    <div class="section-box">
      <h2>Your Profile Info (Click to Edit)</h2>
      <div class="campaign-item" onclick="editProfileField('primary_niche', 'Niche')">
        <h3>Primary Content Niche</h3>
        <div class="campaign-meta" id="metaNiche">--</div>
      </div>
      <div class="campaign-item" onclick="editProfileField('content_style_desc', 'Style')">
        <h3>Content Style Focus</h3>
        <div class="campaign-meta" id="metaStyle">--</div>
      </div>
    </div>
  </div>
</main>

<script>
   supabase = FewsionAuth.client();
  let currentUser = null;

  async function loadProfile() {
     auth = await FewsionAuth.requireAuth("creator");
    if (!auth) return;
    currentUser = auth.user;

    const { data: profile } = await supabase.from("creator_profiles").select("*").eq("user_id", currentUser.id).single();
    if (!profile) return;

    document.getElementById("welcomeHeading").textContent = `Welcome back, ${profile.creator_name.split(' ')[0]}`;
    document.getElementById("cardScore").textContent = profile.ai_total_score || "--";
    document.getElementById("cardFollowers").textContent = profile.follower_count || "0";
    document.getElementById("cardEngagement").textContent = profile.engagement_rate || "--";
    document.getElementById("cardLocation").textContent = profile.target_location || "Global";
    document.getElementById("metaNiche").textContent = profile.primary_niche || "Click to set niche";
    document.getElementById("metaStyle").textContent = profile.content_style_desc || "Click to set style";
  }

  async function editProfileField(column, label) {
    const newValue = prompt(`Enter new value for ${label}:`);
    if (!newValue) return;
    
    const { error } = await supabase.from('creator_profiles').update({ [column]: newValue }).eq('user_id', currentUser.id);
    if (error) alert("Update failed");
    else location.reload();
  }

  document.getElementById('logoutBtn').addEventListener('click', () => FewsionAuth.signOut("login.html"));
  document.addEventListener("DOMContentLoaded", loadProfile);
</script>
</body>
</html>
