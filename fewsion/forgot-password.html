<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password — Fewsion</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --black: #080808; --deep: #0e0e0e; --card: #141414;
    --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.12);
    --amber: #F5A623; --amber2: #FF6B35; --amber-glow: rgba(245,166,35,0.08);
    --text: #f0ece4; --muted: #888; --white: #ffffff;
    --font-display: 'Syne', sans-serif; --font-body: 'DM Sans', sans-serif;
    --radius: 12px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { 
    background: var(--black); 
    color: var(--text); 
    font-family: var(--font-body); 
    min-height: 100vh; 
    display: flex; 
    align-items: center; 
    justify-content: center;
    padding: 20px;
    overflow-x: hidden;
  }
  body::before { 
    content: ''; 
    position: fixed; 
    inset: 0; 
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.035'/%3E%3C/svg%3E"); 
    pointer-events: none; 
    z-index: 999; 
    opacity: 0.4; 
  }

  .auth-container {
    width: 100%;
    max-width: 420px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 40px 32px;
    box-shadow: 0 40px 80px rgba(0,0,0,0.7);
    position: relative;
    z-index: 10;
  }
  .logo { 
    font-family: var(--font-display); 
    font-size: 24px; 
    font-weight: 800; 
    color: var(--white); 
    text-decoration: none;
    display: block;
    text-align: center;
    margin-bottom: 32px;
    letter-spacing: -0.5px;
  }
  .logo span { color: var(--amber); }

  h1 { font-family: var(--font-display); font-size: 22px; font-weight: 800; color: var(--white); margin-bottom: 8px; text-align: center; }
  p.subtitle { color: var(--muted); font-size: 14px; text-align: center; margin-bottom: 28px; line-height: 1.5; }

  .form-group { margin-bottom: 20px; position: relative; }
  .form-label { display: block; font-size: 12px; font-weight: 500; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em; }
  .form-input { width: 100%; background: #000; border: 1px solid var(--border2); border-radius: 8px; padding: 12px 16px; font-size: 14px; color: var(--white); font-family: var(--font-body); transition: border-color 0.2s, box-shadow 0.2s; }
  .form-input:focus { outline: none; border-color: var(--amber); box-shadow: 0 0 0 3px var(--amber-glow); }
  
  .form-error { display: none; font-size: 13px; color: #FF6B35; margin-top: 6px; }
  .form-success { display: none; background: rgba(74,222,128,0.08); border: 1px solid rgba(74,222,128,0.2); color: #4ade80; font-size: 14px; padding: 12px; border-radius: 8px; margin-bottom: 20px; line-height: 1.5; }

  .btn-submit { width: 100%; background: var(--amber); color: #000; font-family: var(--font-display); font-size: 15px; font-weight: 700; padding: 12px; border-radius: 50px; border: none; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; margin-top: 8px; }
  .btn-submit:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(245,166,35,0.25); }

  .back-to-login { display: block; text-align: center; margin-top: 24px; font-size: 13px; color: var(--muted); text-decoration: none; transition: color 0.2s; }
  .back-to-login:hover { color: var(--white); text-decoration: underline; }
</style>
</head>
<body>

<div class="auth-container">
  <a class="logo" href="index.html">Few<span>sion</span></a>
  <h1>Forgot Password?</h1>
  <p class="subtitle">Enter your registered email address and we'll send you a link to reset your password.</p>

  <div class="form-success" id="successMessage">
    ✨ Reset link sent! Check your email inbox (and spam folder) to update your password.
  </div>

  <form id="forgotForm">
    <div class="form-group">
      <label class="form-label">Email Address</label>
      <input class="form-input" id="emailInput" type="email" placeholder="name@company.com" required autocomplete="email">
      <div class="form-error" id="emailError">Please enter a valid email address</div>
    </div>

    <button type="submit" class="btn-submit" id="submitBtn">Send Reset Link →</button>
  </form>

  <a href="login.html" class="back-to-login">← Back to Sign In</a>
</div>

<script>
  // 1. Paste your existing Supabase configuration credentials here
  const SUPABASE_URL = "https://vdtpdqpmxxcwkqslhvwv.supabase.co";
  const SUPABASE_ANON_KEY = "sb_publishable_zZ43Mm55wlCth30mffiUtw_iUZd1Kb3"; // Ensure this matches your standard env setup
  
  const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  document.addEventListener('DOMContentLoaded', () => {
    const forgotForm = document.getElementById('forgotForm');
    const emailInput = document.getElementById('emailInput');
    const emailError = document.getElementById('emailError');
    const successMessage = document.getElementById('successMessage');
    const submitBtn = document.getElementById('submitBtn');

    if (forgotForm) {
      forgotForm.addEventListener('submit', async (e) => {
        e.preventDefault();

        // Reset UI states
        emailError.style.display = 'none';
        emailInput.style.borderColor = '';
        successMessage.style.display = 'none';
        submitBtn.disabled = true;
        submitBtn.innerText = "Sending request...";

        const email = emailInput.value.trim();

        try {
          // 2. Trigger Supabase Password Reset Flow
          // Note: Change 'update-password.html' to whatever page hosts your password change form
          const { data, error } = await supabase.auth.resetPasswordForEmail(email, {
            redirectTo: window.location.origin + '/update-password.html',
          });

          if (error) {
            showError(error.message);
            return;
          }

          // Success State
          successMessage.style.display = 'block';
          forgotForm.reset();

        } catch (err) {
          console.error("Forgot Password Exception:", err);
          showError("An unexpected system error occurred. Please try again.");
        } finally {
          submitBtn.disabled = false;
          submitBtn.innerText = "Send Reset Link →";
        }
      });
    }

    function showError(message) {
      emailError.innerText = message;
      emailError.style.display = 'block';
      emailInput.style.borderColor = 'rgba(255, 107, 53, 0.5)';
    }

    // Clean field on input
    emailInput.addEventListener('input', () => {
      emailError.style.display = 'none';
      emailInput.style.borderColor = '';
    });
  });
</script>
</body>
</html>
